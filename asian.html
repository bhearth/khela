<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e/arth · The Infinite Mandala</title>
    <!-- Neo4j Web Driver for Global Graph Sync -->
    <script src="https://unpkg.com/neo4j-driver@5.12.0/lib/browser/neo4j-web.min.js"></script>
    <style>
        :root {
            --bg-void: #020204;
            --core-glow: #fbbf24;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-void);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* =========================================
           THE CANVAS UNIVERSE
           ========================================= */
        #universe-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        /* =========================================
           HUD & OVERLAYS
           ========================================= */
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .hud > * { pointer-events: auto; }

        /* Top Left: Brand & Status */
        .hud-top-left {
            top: 24px; left: 24px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .brand {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fbbf24, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.75rem; color: var(--text-muted);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-dot.offline { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* Top Right: Controls */
        .hud-top-right {
            top: 24px; right: 24px;
            display: flex; gap: 10px;
        }
        .btn-glass {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); color: var(--text-main);
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-glass:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; color: #fff; }

        /* Bottom: Inspector Panel */
        .inspector {
            position: absolute;
            bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 20px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0; pointer-events: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .inspector.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        
        .inspector-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .inspector-icon { font-size: 2.5rem; filter: drop-shadow(0 0 10px currentColor); }
        .inspector-title { font-size: 1.25rem; font-weight: 700; }
        .inspector-code { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); }
        
        .vector-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px;
        }
        .vector-bar {
            height: 30px; background: rgba(255,255,255,0.05); border-radius: 4px;
            position: relative; overflow: hidden;
        }
        .vector-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, #38bdf8, #818cf8);
            transition: height 0.5s ease;
        }
        .vector-label {
            position: absolute; top: 2px; left: 4px; font-size: 0.6rem; color: #fff; font-weight: 600;
        }

        .connections-list { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
        .connections-list strong { color: #fbbf24; }

        /* Loading Overlay */
        #loader {
            position: absolute; inset: 0; z-index: 100;
            background: var(--bg-void);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .loader-text { font-family: monospace; color: #38bdf8; letter-spacing: 4px; font-size: 0.9rem; margin-top: 20px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(56, 189, 248, 0.2); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- THE RENDER ENGINE -->
    <canvas id="universe-canvas"></canvas>

    <!-- HUD: TOP LEFT -->
    <div class="hud hud-top-left">
        <div class="brand">e/arth · Mandala</div>
        <div class="status-pill">
            <div class="status-dot" id="mesh-status"></div>
            <span id="mesh-status-text">Initializing Mesh...</span>
        </div>
        <div class="status-pill">
            <div class="status-dot offline" id="neo4j-status"></div>
            <span id="neo4j-status-text">Neo4j: Standby</span>
        </div>
    </div>

    <!-- HUD: TOP RIGHT -->
    <div class="hud hud-top-right">
        <button class="btn-glass" onclick="MeshEngine.fetchDeepMesh()">🌌 Expand Universe</button>
        <button class="btn-glass" onclick="Neo4jEngine.connect()">🔗 Sync Neo4j</button>
        <button class="btn-glass" onclick="toggleInspector()">ℹ️ Toggle Panel</button>
    </div>

    <!-- INSPECTOR PANEL -->
    <div class="inspector" id="inspector">
        <div class="inspector-header">
            <div class="inspector-icon" id="insp-icon">✨</div>
            <div>
                <div class="inspector-title" id="insp-title">Select a Node</div>
                <div class="inspector-code" id="insp-code">Code: ---</div>
            </div>
        </div>
        <div class="vector-grid" id="vector-grid">
            <!-- Vector bars injected here -->
        </div>
        <div class="connections-list" id="connections-list">
            Click a glowing dot in the universe to reveal its semantic DNA, 10D Vector, and resonant connections.
        </div>
    </div>

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">WEAVING THE MESH...</div>
    </div>

    <script>
        // ==========================================
        // 1. THE MESH ENGINE (Embedded mesh.js)
        // ==========================================
        const MeshEngine = {
            baseUrl: 'https://bhearth.github.io/khela/',
            cache: {},
            nodes: [],
            connections: [],

            async loadJSON(filename) {
                if (this.cache[filename]) return this.cache[filename];
                try {
                    const res = await fetch(`${this.baseUrl}${filename}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    this.cache[filename] = data;
                    return data;
                } catch (e) {
                    console.warn(`[Mesh] Failed to load ${filename}:`, e);
                    return null;
                }
            },

            // 10D Vector Math: Dot Product for Resonance
            calculateResonance(v1, v2) {
                if (!v1 || !v2 || v1.length !== 10) return 0;
                let dot = 0;
                for (let i = 0; i < 10; i++) dot += (v1[i] * v2[i]);
                return dot;
            },

            // 10D Vector to Color Mapping (Millions of Shades)
            vectorToColor(vector) {
                if (!vector) return '#ffffff';
                // Map specific dimensions to RGB for unique semantic colors
                // Prakriti (Nature/Green), Shaurya (Courage/Red), Viveka (Wisdom/Blue)
                const r = Math.floor((Math.abs(vector[6]) * 0.5 + 0.5) * 255);
                const g = Math.floor((Math.abs(vector[3]) * 0.5 + 0.5) * 255);
                const b = Math.floor((Math.abs(vector[7]) * 0.5 + 0.5) * 255);
                return `rgb(${r}, ${g}, ${b})`;
            },

            async init() {
                updateStatus('mesh', 'Fetching Root Domains...', true);
                const rootData = await this.loadJSON('1.json');
                const symbolData = await this.loadJSON('symbol1.json');

                if (rootData && rootData.domains) {
                    let idx = 0;
                    for (const [code, domain] of Object.entries(rootData.domains)) {
                        this.nodes.push({
                            id: code,
                            name: domain.name,
                            vector: domain.vector,
                            color: this.vectorToColor(domain.vector),
                            icon: this.findIcon(domain.name, symbolData),
                            x: 0, y: 0, // Calculated in RenderEngine
                            radius: 0,
                            angle: 0
                        });
                        idx++;
                    }
                    
                    // Calculate Connections (Resonance > Threshold)
                    for (let i = 0; i < this.nodes.length; i++) {
                        for (let j = i + 1; j < this.nodes.length; j++) {
                            const res = this.calculateResonance(this.nodes[i].vector, this.nodes[j].vector);
                            if (res > 6.5) { // High resonance threshold
                                this.connections.push({ source: i, target: j, strength: res });
                            }
                        }
                    }
                    updateStatus('mesh', `Mesh Active: ${this.nodes.length} Nodes`, true);
                } else {
                    updateStatus('mesh', 'Mesh Offline (Fallback)', false);
                    this.generateFallbackMesh();
                }
            },

            findIcon(name, symbolData) {
                if (!symbolData || !symbolData.categories) return '✨';
                for (const cat of Object.values(symbolData.categories)) {
                    for (const sym of cat.symbols) {
                        if (sym.name.toLowerCase() === name.toLowerCase() || 
                            (sym.tags && sym.tags.some(t => t.toLowerCase() === name.toLowerCase()))) {
                            return sym.icon;
                        }
                    }
                }
                return '✨';
            },

            generateFallbackMesh() {
                // Fallback if GitHub is unreachable
                const fallback = [
                    { id: '0.1', name: 'Individual', vector: [0.8,0.9,0.5,0.6,0.7,0.8,0.6,0.9,0.7,0.8] },
                    { id: '0.8', name: 'Sahyog', vector: [0.95,0.77,0.44,0.82,0.89,0.75,0.66,0.55,0.88,0.91] },
                    { id: '0.9', name: 'Mukti', vector: [0.9,0.95,0.9,0.8,0.95,0.9,0.5,0.95,0.99,0.8] }
                ];
                fallback.forEach(d => {
                    this.nodes.push({
                        id: d.id, name: d.name, vector: d.vector,
                        color: this.vectorToColor(d.vector), icon: '✨',
                        x: 0, y: 0, radius: 0, angle: 0
                    });
                });
            },

            async fetchDeepMesh() {
                updateStatus('mesh', 'Expanding to Level 2...', true);
                const level2 = await this.loadJSON('2.json');
                if (level2 && level2.tree) {
                    // Add children to the visual mesh
                    Object.entries(level2.tree).forEach(([code, name]) => {
                        if (!this.nodes.find(n => n.id === code)) {
                            const vec = Array(10).fill().map(() => Math.random() * 2 - 1); // Randomized vector for demo
                            this.nodes.push({
                                id: code, name: typeof name === 'string' ? name : code,
                                vector: vec, color: this.vectorToColor(vec), icon: '🌿',
                                x: 0, y: 0, radius: 0, angle: 0
                            });
                        }
                    });
                    updateStatus('mesh', `Universe Expanded: ${this.nodes.length} Nodes`, true);
                    RenderEngine.layoutNodes();
                }
            }
        };

        // ==========================================
        // 2. NEO4J ENGINE (Global Graph Sync)
        // ==========================================
        const Neo4jEngine = {
            driver: null,
            // NOTE: In production, NEVER expose credentials in frontend. 
            // Use a backend proxy or environment variables.
            config: {
                uri: 'neo4j+s://613c286a.databases.neo4j.io',
                user: '613c286a',
                password: 'vkKL9AvmRjeV3Y71iTvAmVzMr96t7zI1-7gxU_Ueius'
            },

            async connect() {
                updateStatus('neo4j', 'Connecting to AuraDB...', true);
                try {
                    this.driver = neo4j.driver(
                        this.config.uri,
                        neo4j.auth.basic(this.config.user, this.config.password)
                    );
                    await this.driver.verifyConnectivity();
                    updateStatus('neo4j', 'Neo4j: Connected', true);
                    
                    // Example Query: Fetch nodes from the global graph
                    const session = this.driver.session();
                    const result = await session.run('MATCH (n:Domain) RETURN n LIMIT 5');
                    console.log('[Neo4j] Fetched Global Nodes:', result.records);
                    session.close();
                    
                } catch (e) {
                    console.error('[Neo4j] Connection Failed:', e);
                    updateStatus('neo4j', 'Neo4j: Connection Failed', false);
                }
            }
        };

        // ==========================================
        // 3. RENDER ENGINE (The Blooming Flower)
        // ==========================================
        const RenderEngine = {
            canvas: null, ctx: null,
            width: 0, height: 0,
            centerX: 0, centerY: 0,
            time: 0,
            hoveredNode: null,

            init() {
                this.canvas = document.getElementById('universe-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Interaction
                this.canvas.addEventListener('mousemove', (e) => this.handleHover(e));
                this.canvas.addEventListener('click', (e) => this.handleClick(e));

                this.layoutNodes();
                this.animate();
            },

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width * window.devicePixelRatio;
                this.canvas.height = this.height * window.devicePixelRatio;
                this.canvas.style.width = `${this.width}px`;
                this.canvas.style.height = `${this.height}px`;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                this.centerX = this.width / 2;
                this.centerY = this.height / 2;
                this.layoutNodes();
            },

            layoutNodes() {
                // Phyllotaxis (Golden Angle) for perfect blooming flower
                const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~137.5 degrees
                const scale = Math.min(this.width, this.height) * 0.04;

                MeshEngine.nodes.forEach((node, i) => {
                    node.angle = i * goldenAngle;
                    node.radius = scale * Math.sqrt(i + 1);
                    node.x = this.centerX + Math.cos(node.angle) * node.radius;
                    node.y = this.centerY + Math.sin(node.angle) * node.radius;
                });
            },

            animate() {
                this.time += 0.01;
                this.ctx.clearRect(0, 0, this.width, this.height);

                // Draw Cosmic Background (Millions of Shades representation)
                this.drawCosmicDust();

                // Draw Connections (Semantic Resonance)
                this.drawConnections();

                // Draw Nodes (The Dots)
                this.drawNodes();

                requestAnimationFrame(() => this.animate());
            },

            drawCosmicDust() {
                // Procedural background representing the Zetta-byte mesh
                const ctx = this.ctx;
                for (let i = 0; i < 200; i++) {
                    const x = (Math.sin(i * 0.1 + this.time * 0.2) * 0.5 + 0.5) * this.width;
                    const y = (Math.cos(i * 0.15 + this.time * 0.1) * 0.5 + 0.5) * this.height;
                    const alpha = Math.sin(i + this.time) * 0.1 + 0.1;
                    ctx.fillStyle = `rgba(56, 189, 248, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            },

            drawConnections() {
                const ctx = this.ctx;
                MeshEngine.connections.forEach(conn => {
                    const source = MeshEngine.nodes[conn.source];
                    const target = MeshEngine.nodes[conn.target];
                    if (!source || !target) return;

                    ctx.beginPath();
                    ctx.moveTo(source.x, source.y);
                    ctx.lineTo(target.x, target.y);
                    
                    // Glow effect based on strength
                    const alpha = (conn.strength - 6.5) * 0.2; 
                    ctx.strokeStyle = `rgba(251, 191, 36, ${Math.min(alpha, 0.4)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });
            },

            drawNodes() {
                const ctx = this.ctx;
                MeshEngine.nodes.forEach((node, i) => {
                    const isHovered = this.hoveredNode === i;
                    const baseSize = 8 + (node.vector ? Math.abs(node.vector[9]) * 10 : 5); // Seva vector determines size
                    const size = isHovered ? baseSize * 1.5 : baseSize;
                    const pulse = Math.sin(this.time * 2 + i) * 2;

                    // Outer Glow
                    const gradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, size + 15 + pulse);
                    gradient.addColorStop(0, node.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size + 15 + pulse, 0, Math.PI * 2);
                    ctx.fill();

                    // Core Dot
                    ctx.fillStyle = node.color;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    // Label (if hovered or core)
                    if (isHovered || i === 0) {
                        ctx.fillStyle = '#fff';
                        ctx.font = isHovered ? 'bold 14px Inter' : '12px Inter';
                        ctx.textAlign = 'center';
                        ctx.fillText(node.name, node.x, node.y + size + 20);
                        if (isHovered) {
                            ctx.font = '10px monospace';
                            ctx.fillStyle = '#94a3b8';
                            ctx.fillText(node.id, node.x, node.y + size + 35);
                        }
                    }
                });
            },

            handleHover(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;

                let found = -1;
                MeshEngine.nodes.forEach((node, i) => {
                    const dist = Math.hypot(node.x - mx, node.y - my);
                    if (dist < 20) found = i;
                });

                this.hoveredNode = found === -1 ? null : found;
                this.canvas.style.cursor = found === -1 ? 'crosshair' : 'pointer';
            },

            handleClick(e) {
                if (this.hoveredNode !== null) {
                    const node = MeshEngine.nodes[this.hoveredNode];
                    showInspector(node);
                }
            }
        };

        // ==========================================
        // 4. UI & UTILITIES
        // ==========================================
        function updateStatus(type, text, isOnline) {
            const dot = document.getElementById(`${type}-status`);
            const txt = document.getElementById(`${type}-status-text`);
            if (dot) {
                dot.className = isOnline ? 'status-dot' : 'status-dot offline';
            }
            if (txt) txt.innerText = text;
        }

        function showInspector(node) {
            const panel = document.getElementById('inspector');
            document.getElementById('insp-icon').innerText = node.icon;
            document.getElementById('insp-icon').style.color = node.color;
            document.getElementById('insp-title').innerText = node.name;
            document.getElementById('insp-code').innerText = `Code: ${node.id} · Resonance Active`;

            // Render 10D Vector Bars
            const grid = document.getElementById('vector-grid');
            const dims = ['Ahimsa', 'Satya', 'Aparigraha', 'Prakriti', 'Rta', 'Vinaya', 'Shaurya', 'Viveka', 'Mukti', 'Seva'];
            grid.innerHTML = '';
            if (node.vector) {
                node.vector.forEach((val, i) => {
                    const height = Math.abs(val) * 100;
                    grid.innerHTML += `
                        <div class="vector-bar">
                            <div class="vector-fill" style="height: ${height}%; background: ${node.color};"></div>
                            <div class="vector-label">${dims[i].substring(0,3)}</div>
                        </div>
                    `;
                });
            }

            // Find Resonant Connections
            const connList = document.getElementById('connections-list');
            const resonantNodes = MeshEngine.nodes
                .map((n, i) => ({ node: n, index: i, res: MeshEngine.calculateResonance(node.vector, n.vector) }))
                .filter(c => c.index !== MeshEngine.nodes.indexOf(node) && c.res > 5)
                .sort((a, b) => b.res - a.res)
                .slice(0, 3);

            if (resonantNodes.length > 0) {
                connList.innerHTML = `<strong>Semantic Resonance:</strong><br>` + 
                    resonantNodes.map(c => `→ ${c.node.icon} ${c.node.name} (Score: ${c.res.toFixed(2)})`).join('<br>');
            } else {
                connList.innerHTML = `<strong>Semantic Resonance:</strong><br>This node is exploring new dimensions. Expand the universe to find connections.`;
            }

            panel.classList.add('active');
        }

        function toggleInspector() {
            document.getElementById('inspector').classList.toggle('active');
        }

        // ==========================================
        // 5. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            await MeshEngine.init();
            RenderEngine.init();
            
            // Hide Loader
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });
    </script>
</body>
</html>
