<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khel.o · Real-Time Knowledge Universe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/compromise/14.10.0/compromise.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #030508;
  color: #f8fafc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  height: 100vh;
}
#canvas-container {
  position: absolute;
  inset: 0;
  z-index: 1;
}
.ui-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  padding: 20px;
}
.ui-layer > * { pointer-events: auto; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.logo {
  font-size: 24px;
  font-weight: 700;
  color: #a7f3d0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #fbbf24, #a371f7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  flex: 1;
  overflow: hidden;
}
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
}
.panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-size: 16px;
  font-weight: 700;
  color: #fbbf24;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}
textarea, input[type="text"] {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  resize: none;
  outline: none;
}
textarea:focus, input:focus {
  border-color: #fbbf24;
}
textarea { min-height: 120px; }
.btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover {
  background: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}
.btn-primary {
  background: linear-gradient(135deg, #fbbf24, #a371f7);
  color: #000;
  border: none;
}
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.output {
  flex: 1;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 14px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  color: #a7f3d0;
}
.symbol-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0;
}
.symbol {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.symbol:hover {
  transform: scale(1.2);
}
.ikr-display {
  background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(163,113,247,0.1));
  border: 1px solid #fbbf24;
  border-radius: 12px;
  padding: 16px;
  margin: 12px 0;
}
.ikr-title {
  font-size: 14px;
  font-weight: 700;
  color: #fbbf24;
  margin-bottom: 8px;
}
.ikr-score {
  font-size: 32px;
  font-weight: 700;
  color: #fbbf24;
  font-family: 'JetBrains Mono', monospace;
}
.stat {
  display: inline-block;
  margin: 6px 14px 6px 0;
}
.stat-val {
  font-size: 20px;
  color: #fbbf24;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.stat-lbl {
  font-size: 10px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(16,185,129,0.95);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-weight: 700;
  z-index: 1000;
  animation: slideDown 0.3s;
}
@keyframes slideDown {
  from { transform: translate(-50%, -20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}
#graph-container {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: none;
}
#graph-container.active {
  display: block;
}
.close-graph {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 10;
  background: rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="graph-container"></div>

<div class="ui-layer">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌌</div>
      <span>Khel.o · Real-Time Knowledge Universe</span>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="engine.showStats()">📊 Stats</button>
      <button class="btn" onclick="engine.exportAll()">💾 Export</button>
      <button class="btn btn-primary" onclick="engine.help()">❓ Help</button>
    </div>
  </div>

  <div class="main-grid">
    <!-- LEFT: Input & Essence Extraction -->
    <div class="panel">
      <div class="panel-title">📥 Input → Essence → Symbols</div>
      <div class="input-area">
        <textarea id="input" placeholder="Paste any text, URL, or content..."></textarea>
        <input type="text" id="url-input" placeholder="Or enter URL to extract (https://...)">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="engine.extractEssence()">✨ Extract Essence</button>
          <button class="btn" onclick="engine.extractFromURL()">🔗 Extract from URL</button>
          <button class="btn" onclick="engine.convertToSymbols()">🔤 Convert to Symbols</button>
        </div>
        <div class="symbol-row" id="symbol-display"></div>
        <div>
          <div class="stat"><div class="stat-val" id="s-essence">0</div><div class="stat-lbl">Essence</div></div>
          <div class="stat"><div class="stat-val" id="s-symbols">0</div><div class="stat-lbl">Symbols</div></div>
          <div class="stat"><div class="stat-val" id="s-compression">1x</div><div class="stat-lbl">Compression</div></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: IKR & Knowledge Map -->
    <div class="panel">
      <div class="panel-title">🎯 IKR · Knowledge Map · 3D View</div>
      <div class="ikr-display" id="ikr-display">
        <div class="ikr-title">🎯 IKR Score (Idealistic Key Result)</div>
        <div class="ikr-score" id="ikr-score">0</div>
        <div style="margin-top: 8px; font-size: 12px; color: #94a3b8;">
          Measures: Wisdom + Understanding + Contribution
        </div>
      </div>
      <div class="output" id="output">Waiting for input...</div>
      <div class="btn-row">
        <button class="btn" onclick="engine.view3D()">🌊 View in 3D</button>
        <button class="btn" onclick="engine.addToMap()">🗺️ Add to Knowledge Map</button>
        <button class="btn" onclick="engine.share()">🔗 Share</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// KHÉL.O ENGINE
// ============================================
const engine = {
  scene: null,
  camera: null,
  renderer: null,
  particles: null,
  cy: null,
  essenceData: null,
  symbolData: null,
  ikrScore: 0,
  
  init() {
    this.init3D();
    this.animate();
  },
  
  init3D() {
    const container = document.getElementById('canvas-container');
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x030508);
    
    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.camera.position.z = 50;
    
    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(this.renderer.domElement);
    
    // Create particle universe
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];
    
    for (let i = 0; i < 5000; i++) {
      vertices.push(
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200
      );
      
      const color = new THREE.Color();
      color.setHSL(Math.random() * 0.2 + 0.1, 0.8, 0.6);
      colors.push(color.r, color.g, color.b);
    }
    
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    
    const material = new THREE.PointsMaterial({
      size: 0.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.6
    });
    
    this.particles = new THREE.Points(geometry, material);
    this.scene.add(this.particles);
    
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  },
  
  async extractEssence() {
    const input = document.getElementById('input').value;
    if (!input.trim()) {
      this.showToast('Please enter content');
      return;
    }
    
    this.showToast('✨ Extracting essence...');
    
    // Use compromise.js for linguistic analysis
    const doc = compromise(input);
    
    // Extract entities
    const people = doc.people().out('array');
    const places = doc.places().out('array');
    const organizations = doc.organizations().out('array');
    
    // Extract keywords (nouns with high frequency)
    const nouns = doc.nouns().out('array');
    const keywords = [...new Set(nouns)].slice(0, 20);
    
    // Extract topics (sentences with key concepts)
    const topics = doc.sentences().out('array').slice(0, 10);
    
    // Calculate essence vector
    const essence = {
      type: this.detectType(input),
      entities: { people, places, organizations },
      keywords,
      topics,
      wordCount: doc.words().length,
      sentenceCount: doc.sentences().length
    };
    
    this.essenceData = essence;
    
    // Calculate IKR score
    this.calculateIKR(essence);
    
    // Display essence
    this.displayEssence(essence);
    
    // Convert to symbols
    this.convertToSymbols();
    
    this.showToast('✓ Essence extracted');
  },
  
  async extractFromURL() {
    const url = document.getElementById('url-input').value;
    if (!url.trim()) {
      this.showToast('Please enter URL');
      return;
    }
    
    this.showToast('🔗 Extracting from URL...');
    
    try {
      // Use a CORS proxy for demo
      const proxy = 'https://api.allorigins.win/get?url=';
      const response = await fetch(proxy + encodeURIComponent(url));
      const data = await response.json();
      
      // Extract text from HTML
      const parser = new DOMParser();
      const doc = parser.parseFromString(data.contents, 'text/html');
      
      // Remove scripts and styles
      doc.querySelectorAll('script, style').forEach(el => el.remove());
      
      const text = doc.body.innerText;
      document.getElementById('input').value = text;
      
      // Extract essence
      await this.extractEssence();
      
      this.showToast('✓ URL extracted');
    } catch (e) {
      this.showToast('Error extracting URL: ' + e.message);
    }
  },
  
  detectType(input) {
    if (input.includes('function') || input.includes('const ')) return 'code';
    if (input.startsWith('http')) return 'url';
    if (input.includes('{') && input.includes('}')) {
      try {
        JSON.parse(input);
        return 'json';
      } catch(e) {}
    }
    return 'text';
  },
  
  calculateIKR(essence) {
    // IKR calculation based on:
    // - Wisdom (depth of content)
    // - Understanding (clarity)
    // - Contribution (value to others)
    
    const wisdom = Math.min(100, essence.keywords.length * 5);
    const understanding = Math.min(100, essence.topics.length * 10);
    const contribution = Math.min(100, essence.entities.people.length * 10 + essence.entities.places.length * 10);
    
    this.ikrScore = Math.round((wisdom + understanding + contribution) / 3);
    
    document.getElementById('ikr-score').textContent = this.ikrScore;
  },
  
  displayEssence(essence) {
    const output = document.getElementById('output');
    output.innerHTML = `
<strong style="color: #fbbf24;">Essence Extracted</strong>

<strong style="color: #a7f3d0;">Type:</strong> ${essence.type}
<strong style="color: #a7f3d0;">Words:</strong> ${essence.wordCount}
<strong style="color: #a7f3d0;">Sentences:</strong> ${essence.sentenceCount}

<strong style="color: #fbbf24;">Keywords (${essence.keywords.length}):</strong>
${essence.keywords.join(', ')}

<strong style="color: #fbbf24;">Entities:</strong>
People: ${essence.entities.people.length}
Places: ${essence.entities.places.length}
Organizations: ${essence.entities.organizations.length}

<strong style="color: #fbbf24;">Topics:</strong>
${essence.topics.map(t => '• ' + t).join('\n')}
`;
    
    document.getElementById('s-essence').textContent = essence.keywords.length;
  },
  
  convertToSymbols() {
    if (!this.essenceData) {
      this.showToast('Please extract essence first');
      return;
    }
    
    this.showToast('🔤 Converting to symbols...');
    
    // Use hypercode library if available
    const lib = window.Q ? window.Q.lib : (window.KHELO ? window.KHELO.lib : null);
    
    const symbols = [];
    const display = document.getElementById('symbol-display');
    
    // Map keywords to symbols
    this.essenceData.keywords.forEach((keyword, i) => {
      let symbol;
      if (lib) {
        const keys = Object.keys(lib);
        symbol = keys[i % keys.length];
      } else {
        // Fallback: use emoji based on keyword
        const emojis = ['🌱', '', '🔥', '🌍', '☀️', '🌙', '⭐', '🌸', '🍃', '🎨'];
        symbol = emojis[i % emojis.length];
      }
      symbols.push(symbol);
    });
    
    this.symbolData = symbols;
    
    // Display symbols
    display.innerHTML = symbols.map((s, i) => {
      const lib = window.Q ? window.Q.lib : null;
      const data = lib && lib[s] ? lib[s] : { col: '#888' };
      return `<div class="symbol" style="background:${data.col}20; color:${data.col}; border:2px solid ${data.col};" 
              title="${this.essenceData.keywords[i]}" onclick="engine.view3DNode(${i})">${s}</div>`;
    }).join('');
    
    document.getElementById('s-symbols').textContent = symbols.length;
    
    const compression = (this.essenceData.wordCount / symbols.length).toFixed(1);
    document.getElementById('s-compression').textContent = compression + 'x';
    
    this.showToast('✓ Symbols generated');
  },
  
  view3D() {
    if (!this.essenceData) {
      this.showToast('Please extract essence first');
      return;
    }
    
    this.showToast('🌊 Opening 3D view...');
    
    const container = document.getElementById('graph-container');
    container.classList.add('active');
    
    // Initialize Cytoscape
    this.cy = cytoscape({
      container: container,
      elements: this.buildGraphElements(),
      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': '#fbbf24',
            'color': '#000',
            'text-valign': 'center',
            'text-halign': 'center',
            'width': 40,
            'height': 40,
            'font-size': '12px'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 2,
            'line-color': '#a371f7',
            'target-arrow-color': '#a371f7',
            'target-arrow-shape': 'triangle'
          }
        }
      ],
      layout: {
        name: 'cose',
        animate: true,
        animationDuration: 1000
      }
    });
    
    // Add close button
    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-graph';
    closeBtn.textContent = '✕ Close 3D View';
    closeBtn.onclick = () => {
      container.classList.remove('active');
      container.innerHTML = '';
      this.cy = null;
    };
    container.appendChild(closeBtn);
  },
  
  view3DNode(index) {
    if (!this.cy) {
      this.view3D();
    }
    
    // Focus on specific node
    setTimeout(() => {
      const nodes = this.cy.nodes();
      if (nodes[index]) {
        this.cy.center(nodes[index]);
        this.cy.zoom(2);
      }
    }, 500);
  },
  
  buildGraphElements() {
    const elements = [];
    
    // Add center node (essence)
    elements.push({
      data: { id: 'center', label: 'Essence' }
    });
    
    // Add keyword nodes
    this.essenceData.keywords.forEach((keyword, i) => {
      elements.push({
        data: { id: `keyword-${i}`, label: keyword }
      });
      elements.push({
        data: { source: 'center', target: `keyword-${i}` }
      });
    });
    
    // Add entity nodes
    this.essenceData.entities.places.forEach((place, i) => {
      elements.push({
        data: { id: `place-${i}`, label: place }
      });
      elements.push({
        data: { source: 'center', target: `place-${i}` }
      });
    });
    
    return elements;
  },
  
  addToMap() {
    if (!this.essenceData) {
      this.showToast('Please extract essence first');
      return;
    }
    
    this.showToast('🗺️ Adding to knowledge map...');
    
    // Store in localStorage for now
    const map = JSON.parse(localStorage.getItem('khelo-map') || '[]');
    map.push({
      timestamp: Date.now(),
      essence: this.essenceData,
      ikr: this.ikrScore,
      symbols: this.symbolData
    });
    localStorage.setItem('khelo-map', JSON.stringify(map));
    
    this.showToast('✓ Added to knowledge map');
  },
  
  share() {
    if (!this.essenceData) {
      this.showToast('Nothing to share');
      return;
    }
    
    const data = {
      essence: this.essenceData,
      ikr: this.ikrScore,
      symbols: this.symbolData,
      timestamp: Date.now()
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `khelo-essence-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    this.showToast('✓ Shared');
  },
  
  showStats() {
    const map = JSON.parse(localStorage.getItem('khelo-map') || '[]');
    this.showToast(`📊 ${map.length} contributions in knowledge map`);
  },
  
  exportAll() {
    const map = JSON.parse(localStorage.getItem('khelo-map') || '[]');
    const blob = new Blob([JSON.stringify(map, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `khelo-knowledge-map-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    this.showToast('✓ Exported');
  },
  
  help() {
    this.showToast('🌌 Paste content → Extract essence → Convert to symbols → View in 3D');
  },
  
  showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  },
  
  animate() {
    requestAnimationFrame(() => this.animate());
    
    if (this.particles) {
      this.particles.rotation.x += 0.0005;
      this.particles.rotation.y += 0.001;
    }
    
    this.renderer.render(this.scene, this.camera);
  }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  engine.init();
});
</script>

</body>
</html>
