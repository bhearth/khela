<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khel.o · Chunk Compiler · WonderGraph</title>
<script src="hypercode-lib.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #030508; color: #f8fafc; font-family: -apple-system, sans-serif; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { color: #fbbf24; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
.panel h2 { color: #fbbf24; font-size: 16px; margin-bottom: 12px; }
textarea, input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; color: #fff; font-family: monospace; font-size: 13px; }
textarea { min-height: 200px; resize: vertical; }
.btn { background: #fbbf24; color: #000; border: none; padding: 10px 18px; border-radius: 20px; font-weight: 700; cursor: pointer; margin: 4px; }
.btn:hover { background: #fcd34d; }
.btn.alt { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.chunk { background: rgba(0,0,0,0.3); border-left: 3px solid #fbbf24; padding: 12px; margin: 10px 0; border-radius: 8px; }
.chunk-title { color: #fbbf24; font-weight: 700; margin-bottom: 6px; }
.chunk-text { font-size: 13px; line-height: 1.6; color: #94a3b8; }
.chunk-symbols { margin-top: 8px; font-size: 18px; }
.graph { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 20px; min-height: 400px; position: relative; }
.node { position: absolute; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.3s; }
.node:hover { transform: scale(1.2); }
.edge { position: absolute; height: 2px; background: rgba(251,191,36,0.3); transform-origin: left center; }
.stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; }
.stat-val { font-size: 24px; font-weight: 700; color: #fbbf24; }
.stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(16,185,129,0.95); color: #fff; padding: 12px 24px; border-radius: 24px; font-weight: 700; z-index: 1000; }
</style>
</head>
<body>
<div class="container">
  <h1>🌌 Khel.o · Chunk Compiler · WonderGraph</h1>
  <p style="color:#94a3b8;margin-bottom:20px;">Input → Chunk → Extract Essence → Map Symbols → WonderGraph</p>

  <div class="grid">
    <div class="panel">
      <h2>📥 Input (Text, URL, or Paste)</h2>
      <textarea id="input" placeholder="Paste text, enter URL, or upload file..."></textarea>
      <div style="margin-top:12px;">
        <button class="btn" onclick="compiler.chunkAndExtract()">🔪 Chunk & Extract</button>
        <button class="btn" onclick="compiler.loadWiki()">📚 Load Wiki Page</button>
        <button class="btn alt" onclick="compiler.loadSample()">✨ Sample</button>
        <button class="btn alt" onclick="compiler.clear()">🗑️ Clear</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="s-chunks">0</div><div class="stat-lbl">Chunks</div></div>
        <div class="stat"><div class="stat-val" id="s-essence">0</div><div class="stat-lbl">Essence</div></div>
        <div class="stat"><div class="stat-val" id="s-symbols">0</div><div class="stat-lbl">Symbols</div></div>
        <div class="stat"><div class="stat-val" id="s-connections">0</div><div class="stat-lbl">Connections</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>🌊 WonderGraph Visualization</h2>
      <div class="graph" id="graph"></div>
      <div style="margin-top:12px;">
        <button class="btn" onclick="compiler.exportGraph()">💾 Export Graph</button>
        <button class="btn alt" onclick="compiler.showConnections()">🔗 Show Connections</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>📊 Extracted Chunks with Essence & Symbols</h2>
    <div id="chunks-output"></div>
  </div>
</div>

<script>
const compiler = {
  chunks: [],
  essence: [],
  symbols: [],
  connections: [],
  
  chunkAndExtract() {
    const input = document.getElementById('input').value;
    if (!input.trim()) {
      this.showToast('Please enter content');
      return;
    }
    
    this.showToast('🔪 Chunking & Extracting...');
    
    // Step 1: Chunk into paragraphs
    this.chunks = this.chunkText(input);
    
    // Step 2: Extract essence from each chunk
    this.essence = this.chunks.map((chunk, i) => this.extractEssence(chunk, i));
    
    // Step 3: Map to symbols using hypercode
    this.symbols = this.essence.map(e => this.mapToSymbols(e));
    
    // Step 4: Find connections between chunks
    this.connections = this.findConnections();
    
    // Step 5: Render
    this.renderChunks();
    this.renderGraph();
    this.updateStats();
    
    this.showToast('✓ Compiled successfully');
  },
  
  chunkText(text) {
    // Split by paragraphs, sentences, or semantic breaks
    const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 20);
    
    // If too few paragraphs, split by sentences
    if (paragraphs.length < 3) {
      return text.split(/[.!?]+/).filter(s => s.trim().length > 10).map(s => s.trim());
    }
    
    return paragraphs.map(p => p.trim());
  },
  
  extractEssence(chunk, index) {
    // Extract keywords, entities, and semantic meaning
    const words = chunk.split(/\s+/);
    const keywords = this.extractKeywords(chunk);
    const entities = this.extractEntities(chunk);
    
    // Calculate semantic vector (simplified)
    const vector = this.calculateVector(keywords);
    
    return {
      id: index,
      text: chunk,
      words: words.length,
      keywords: keywords,
      entities: entities,
      vector: vector,
      essence: keywords.slice(0, 3).join(' + ')
    };
  },
  
  extractKeywords(text) {
    const stops = new Set(['the','and','is','of','to','in','for','with','a','an','on','at','by','from','as','that','this','it','are','was','be','or','but','not','you','all','can','had','her','was','one','our','out']);
    const words = text.toLowerCase().replace(/[^\w\s]/g,' ').split(/\s+/);
    const freq = {};
    words.forEach(w => {
      if (w.length > 3 && !stops.has(w)) freq[w] = (freq[w] || 0) + 1;
    });
    return Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 10).map(e => e[0]);
  },
  
  extractEntities(text) {
    const entities = {
      people: (text.match(/\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*\b/g) || []).slice(0, 5),
      places: (text.match(/\b(?:New York|London|Paris|Tokyo|India|China|USA)\b/gi) || []),
      numbers: (text.match(/\b\d+(?:\.\d+)?(?:%|k|m|b)?\b/g) || []).slice(0, 5)
    };
    return entities;
  },
  
  calculateVector(keywords) {
    // Map keywords to 10D semantic space
    const vector = new Array(10).fill(0);
    keywords.forEach((kw, i) => {
      const hash = kw.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
      vector[i % 10] += hash / 1000;
    });
    // Normalize
    const mag = Math.sqrt(vector.reduce((sum, v) => sum + v * v, 0));
    return vector.map(v => v / (mag || 1));
  },
  
  mapToSymbols(essence) {
    // Use hypercode library if available
    const lib = window.Q ? window.Q.lib : (window.KHELO ? window.KHELO.lib : null);
    
    if (!lib) {
      // Fallback: use emoji based on keywords
      const emojis = ['🌱', '💧', '🔥', '🌍', '☀️', '🌙', '⭐', '🌸', '🍃', '🎨'];
      return essence.keywords.slice(0, 5).map((kw, i) => emojis[i % emojis.length]);
    }
    
    // Map keywords to hypercode symbols
    const keys = Object.keys(lib);
    return essence.keywords.slice(0, 5).map((kw, i) => {
      const hash = kw.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
      return keys[hash % keys.length];
    });
  },
  
  findConnections() {
    const connections = [];
    
    // Connect chunks with similar keywords
    for (let i = 0; i < this.essence.length; i++) {
      for (let j = i + 1; j < this.essence.length; j++) {
        const similarity = this.cosineSimilarity(this.essence[i].vector, this.essence[j].vector);
        if (similarity > 0.3) {
          connections.push({
            from: i,
            to: j,
            strength: similarity
          });
        }
      }
    }
    
    return connections;
  },
  
  cosineSimilarity(v1, v2) {
    let dot = 0, n1 = 0, n2 = 0;
    for (let i = 0; i < v1.length; i++) {
      dot += v1[i] * v2[i];
      n1 += v1[i] * v1[i];
      n2 += v2[i] * v2[i];
    }
    return dot / (Math.sqrt(n1) * Math.sqrt(n2) || 1);
  },
  
  renderChunks() {
    const output = document.getElementById('chunks-output');
    output.innerHTML = this.essence.map((e, i) => `
      <div class="chunk">
        <div class="chunk-title">Chunk ${i + 1} · ${e.words} words</div>
        <div class="chunk-text">${e.text.substring(0, 200)}${e.text.length > 200 ? '...' : ''}</div>
        <div style="margin-top:8px;font-size:12px;color:#a7f3d0;">
          <strong>Keywords:</strong> ${e.keywords.join(', ')}
        </div>
        <div style="margin-top:6px;font-size:12px;color:#94a3b8;">
          <strong>Entities:</strong> People: ${e.entities.people.length}, Places: ${e.entities.places.length}, Numbers: ${e.entities.numbers.length}
        </div>
        <div class="chunk-symbols">${this.symbols[i].join(' ')}</div>
        <div style="margin-top:6px;font-size:11px;color:#64748b;">
          <strong>Essence:</strong> ${e.essence}
        </div>
      </div>
    `).join('');
  },
  
  renderGraph() {
    const graph = document.getElementById('graph');
    graph.innerHTML = '';
    
    const width = graph.offsetWidth;
    const height = graph.offsetHeight;
    const centerX = width / 2;
    const centerY = height / 2;
    const radius = Math.min(width, height) / 3;
    
    // Render nodes in circular layout
    this.essence.forEach((e, i) => {
      const angle = (i / this.essence.length) * Math.PI * 2;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;
      
      const node = document.createElement('div');
      node.className = 'node';
      node.style.left = (x - 30) + 'px';
      node.style.top = (y - 30) + 'px';
      node.style.background = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.2)`;
      node.style.border = `2px solid #fbbf24`;
      node.textContent = this.symbols[i][0] || '◉';
      node.title = `Chunk ${i + 1}: ${e.essence}`;
      node.onclick = () => this.highlightChunk(i);
      
      graph.appendChild(node);
    });
    
    // Render edges
    this.connections.forEach(conn => {
      const node1 = graph.children[conn.from];
      const node2 = graph.children[conn.to];
      
      const x1 = parseInt(node1.style.left) + 30;
      const y1 = parseInt(node1.style.top) + 30;
      const x2 = parseInt(node2.style.left) + 30;
      const y2 = parseInt(node2.style.top) + 30;
      
      const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
      const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
      
      const edge = document.createElement('div');
      edge.className = 'edge';
      edge.style.left = x1 + 'px';
      edge.style.top = y1 + 'px';
      edge.style.width = length + 'px';
      edge.style.transform = `rotate(${angle}deg)`;
      edge.style.opacity = conn.strength;
      
      graph.appendChild(edge);
    });
  },
  
  highlightChunk(index) {
    const chunks = document.querySelectorAll('.chunk');
    chunks.forEach((c, i) => {
      c.style.borderLeftColor = i === index ? '#10b981' : '#fbbf24';
    });
  },
  
  updateStats() {
    document.getElementById('s-chunks').textContent = this.chunks.length;
    document.getElementById('s-essence').textContent = this.essence.reduce((sum, e) => sum + e.keywords.length, 0);
    document.getElementById('s-symbols').textContent = this.symbols.flat().length;
    document.getElementById('s-connections').textContent = this.connections.length;
  },
  
  async loadWiki() {
    const url = prompt('Enter Wiki URL (e.g., https://kids.miraheze.org/wiki/Water):');
    if (!url) return;
    
    this.showToast('📚 Fetching Wiki page...');
    
    try {
      // Extract page title from URL
      const title = url.split('/wiki/')[1]?.replace(/_/g, ' ') || 'Water';
      
      // Fetch from MediaWiki API
      const apiUrl = `https://kids.miraheze.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*`;
      const response = await fetch(apiUrl);
      const data = await response.json();
      
      if (data.parse) {
        // Extract text from HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.parse.text['*'], 'text/html');
        const text = doc.body.innerText;
        
        document.getElementById('input').value = text;
        this.showToast('✓ Wiki page loaded');
      } else {
        this.showToast('❌ Page not found');
      }
    } catch (e) {
      this.showToast('❌ Error: ' + e.message);
    }
  },
  
  loadSample() {
    document.getElementById('input').value = `Water is essential for all known forms of life. Only 3% of Earth's water is fresh, yet it sustains all terrestrial ecosystems. The water cycle involves evaporation, condensation, and precipitation.

Human civilization has always developed around water sources. Ancient cities like Mohenjo-daro and Mesopotamia were built near rivers. Today, water scarcity affects over 2 billion people globally.

Climate change is altering precipitation patterns worldwide. Glaciers are melting at unprecedented rates, affecting freshwater supplies. Conservation and sustainable water management are critical for future survival.`;
    this.showToast('✓ Sample loaded');
  },
  
  exportGraph() {
    const data = {
      chunks: this.chunks,
      essence: this.essence,
      symbols: this.symbols,
      connections: this.connections,
      timestamp: new Date().toISOString()
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `khelo-graph-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    this.showToast('✓ Graph exported');
  },
  
  showConnections() {
    const output = document.getElementById('chunks-output');
    output.innerHTML = '<h3 style="color:#fbbf24;margin-bottom:12px;">🔗 Connections Between Chunks</h3>';
    output.innerHTML += this.connections.map(conn => `
      <div class="chunk">
        <div class="chunk-title">Chunk ${conn.from + 1} ↔ Chunk ${conn.to + 1}</div>
        <div class="chunk-text">Similarity: ${(conn.strength * 100).toFixed(1)}%</div>
        <div style="margin-top:8px;font-size:12px;color:#a7f3d0;">
          <strong>Shared Keywords:</strong> ${this.findSharedKeywords(conn.from, conn.to).join(', ')}
        </div>
      </div>
    `).join('');
  },
  
  findSharedKeywords(i, j) {
    const kw1 = new Set(this.essence[i].keywords);
    const kw2 = this.essence[j].keywords;
    return kw2.filter(kw => kw1.has(kw));
  },
  
  clear() {
    document.getElementById('input').value = '';
    document.getElementById('chunks-output').innerHTML = '';
    document.getElementById('graph').innerHTML = '';
    this.chunks = [];
    this.essence = [];
    this.symbols = [];
    this.connections = [];
    this.updateStats();
    this.showToast('✓ Cleared');
  },
  
  showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  console.log('🌌 Khel.o Chunk Compiler initialized');
  if (window.Q) console.log('✓ HyperCode Library loaded');
  else console.warn('⚠ HyperCode Library not found - using fallback symbols');
});
</script>
</body>
</html>
