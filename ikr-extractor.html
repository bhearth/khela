<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khel.o · HyperCode Universe · Final Integration</title>
<script src="hypercode-lib.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #030508;
  --surface: rgba(255,255,255,0.04);
  --glass: rgba(255,255,255,0.08);
  --accent: #fbbf24;
  --text: #f8fafc;
  --muted: #94a3b8;
  --success: #10b981;
  --error: #ef4444;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  height: 100vh;
}
#canvas-container {
  position: absolute;
  inset: 0;
  z-index: 1;
}
.ui-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}
.ui-layer > * { pointer-events: auto; }

/* HEADER */
.header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #fbbf24, #a371f7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.controls {
  display: flex;
  gap: 10px;
}
.btn {
  background: var(--surface);
  border: 1px solid var(--glass);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}
.btn-primary {
  background: var(--accent);
  color: #000;
  border: none;
}
.btn-primary:hover {
  background: #fcd34d;
}

/* MAIN PANELS */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 0 20px 20px;
  flex: 1;
  overflow: hidden;
}
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
}
.panel {
  background: var(--surface);
  border: 1px solid var(--glass);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}
textarea, input[type="text"] {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--glass);
  border-radius: 10px;
  padding: 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  resize: none;
  outline: none;
}
textarea:focus, input:focus {
  border-color: var(--accent);
}
textarea { min-height: 120px; }
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.output {
  flex: 1;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--glass);
  border-radius: 10px;
  padding: 14px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  color: #a7f3d0;
}
.stat {
  display: inline-block;
  margin: 6px 14px 6px 0;
}
.stat-val {
  font-size: 20px;
  color: var(--accent);
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.stat-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* VOICE BUTTON */
.voice-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.voice-btn:hover {
  transform: scale(1.1);
}
.voice-btn.recording {
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
  50% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
}

/* SYMBOL DISPLAY */
.symbol-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0;
}
.symbol {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.symbol:hover {
  transform: scale(1.2);
}

/* IKRq DISPLAY */
.ikr-display {
  background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(163,113,247,0.1));
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 16px;
  margin: 12px 0;
}
.ikr-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}
.ikr-score {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
}
.ikr-level {
  font-size: 14px;
  margin-top: 8px;
}

/* TOAST */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(16,185,129,0.95);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-weight: 700;
  z-index: 1000;
  animation: slideDown 0.3s;
}
@keyframes slideDown {
  from { transform: translate(-50%, -20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

/* PIPELINE */
.pipeline-step {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--glass);
  border-radius: 12px;
  padding: 12px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.pipeline-step .icon { font-size: 24px; }
.pipeline-step .label { flex: 1; font-size: 13px; }
.pipeline-step .status { color: var(--muted); font-size: 11px; }
.pipeline-step.active { border-color: var(--accent); background: rgba(251,191,36,0.05); }
.pipeline-step.complete { border-color: var(--success); background: rgba(16,185,129,0.05); }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-layer">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌌</div>
      <span>Khel.o · HyperCode Universe</span>
    </div>
    <div class="controls">
      <button class="btn" onclick="engine.showStats()">📊 Stats</button>
      <button class="btn" onclick="engine.exportAll()">💾 Export</button>
      <button class="btn btn-primary" onclick="engine.help()">❓ Help</button>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">
    <!-- LEFT: INPUT & VOICE -->
    <div class="panel">
      <div class="panel-title">📥 Input & Voice</div>
      <div class="input-area">
        <textarea id="input" placeholder="Type or speak anything..."></textarea>
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="voice-btn" id="voice-btn" onclick="voice.toggle()">🎤</button>
          <div style="flex: 1;">
            <div style="font-size: 12px; color: var(--muted);">Voice Input</div>
            <div id="voice-status" style="font-size: 11px; color: var(--accent);">Click mic to start</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="engine.compress()">🗜️ Compress</button>
          <button class="btn" onclick="engine.analyze()">🔍 Analyze</button>
          <button class="btn" onclick="engine.loadSample()">✨ Sample</button>
          <button class="btn" onclick="engine.clear()">🗑️ Clear</button>
        </div>
        <div>
          <div class="stat"><div class="stat-val" id="s-original">0</div><div class="stat-lbl">Original</div></div>
          <div class="stat"><div class="stat-val" id="s-compressed">0</div><div class="stat-lbl">Compressed</div></div>
          <div class="stat"><div class="stat-val" id="s-ratio">1x</div><div class="stat-lbl">Ratio</div></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: OUTPUT & IKRq -->
    <div class="panel">
      <div class="panel-title">✨ Symbol Output & IKRq</div>
      <div class="symbol-row" id="symbols"></div>
      <div class="output" id="output">Waiting for input...</div>
      <div class="ikr-display" id="ikr-display" style="display: none;">
        <div class="ikr-title">🎯 IKRq Score</div>
        <div class="ikr-score" id="ikr-score">0</div>
        <div class="ikr-level" id="ikr-level"></div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="engine.decompress()">📂 Decompress</button>
        <button class="btn" onclick="engine.speak()">🔊 Speak</button>
        <button class="btn" onclick="engine.visualize()">🌊 Visualize</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// VOICE ENGINE (Web Speech API)
// ============================================
const voice = {
  recognition: null,
  isRecording: false,
  
  toggle() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      engine.showToast('Voice not supported');
      return;
    }
    
    if (this.isRecording) {
      this.recognition.stop();
      this.isRecording = false;
      document.getElementById('voice-btn').classList.remove('recording');
      document.getElementById('voice-status').textContent = 'Click mic to start';
      return;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    this.recognition = new SpeechRecognition();
    this.recognition.continuous = false;
    this.recognition.interimResults = true;
    this.recognition.lang = 'en-US';
    
    this.recognition.onstart = () => {
      this.isRecording = true;
      document.getElementById('voice-btn').classList.add('recording');
      document.getElementById('voice-status').textContent = 'Listening...';
    };
    
    this.recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById('input').value = transcript;
      document.getElementById('voice-status').textContent = transcript;
    };
    
    this.recognition.onerror = (event) => {
      engine.showToast('Voice error: ' + event.error);
      this.isRecording = false;
      document.getElementById('voice-btn').classList.remove('recording');
    };
    
    this.recognition.onend = () => {
      this.isRecording = false;
      document.getElementById('voice-btn').classList.remove('recording');
      document.getElementById('voice-status').textContent = 'Click mic to start';
    };
    
    this.recognition.start();
  },
  
  speak(text) {
    if (!('speechSynthesis' in window)) {
      engine.showToast('Speech not supported');
      return;
    }
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    utterance.pitch = 1;
    utterance.volume = 1;
    speechSynthesis.speak(utterance);
  }
};

// ============================================
// IKRq SCORING ENGINE
// ============================================
const ikrq = {
  signals: {
    empathy: ['help','child','blind','feel','heart','love','care','kind','compassion','together','we','us','everyone','all'],
    wisdom: ['why','how','meaning','truth','understand','wisdom','learn','know','see','witness','remember'],
    scope: ['planet','earth','universe','all','every','whole','infinite','cosmic','eternal','always'],
    action: ['build','create','heal','grow','become','transform','evolve','awaken','liberate','serve'],
    nature: ['water','soil','tree','sun','moon','star','river','mountain','seed','flower','earth','air','fire'],
    depth: ['silent','deep','root','ancient','sacred','hidden','still','quiet','pure','essential']
  },
  
  score(text) {
    const lower = text.toLowerCase();
    const scores = {};
    let total = 0;
    
    for (const [cat, signals] of Object.entries(this.signals)) {
      let count = 0;
      signals.forEach(s => { if (lower.includes(s)) count++; });
      scores[cat] = Math.min(1, count / 3);
      total += scores[cat];
    }
    
    const maxPossible = Object.keys(this.signals).length;
    const score = Math.round((total / maxPossible) * 100);
    
    let level = 1;
    if (score >= 15) level = 2;
    if (score >= 30) level = 3;
    if (score >= 45) level = 5;
    if (score >= 60) level = 8;
    if (score >= 75) level = 13;
    if (score >= 88) level = 21;
    
    return { score, level, breakdown: scores };
  }
};

// ============================================
// MAIN ENGINE
// ============================================
const engine = {
  scene: null,
  camera: null,
  renderer: null,
  particles: null,
  compressedData: null,
  binaryData: null,
  symbolData: null,
  
  init() {
    this.init3D();
    this.animate();
    
    // Check if hypercode-lib.js loaded
    if (window.Q) {
      console.log('✓ HyperCode Library loaded');
      console.log(`✓ ${Object.keys(window.Q.lib).length} symbols available`);
    } else {
      console.warn('⚠ HyperCode Library not found');
    }
  },
  
  init3D() {
    const container = document.getElementById('canvas-container');
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x030508);
    
    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.camera.position.z = 50;
    
    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(this.renderer.domElement);
    
    // Create particle universe
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];
    
    for (let i = 0; i < 5000; i++) {
      vertices.push(
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200
      );
      
      const color = new THREE.Color();
      color.setHSL(Math.random() * 0.2 + 0.1, 0.8, 0.6);
      colors.push(color.r, color.g, color.b);
    }
    
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    
    const material = new THREE.PointsMaterial({
      size: 0.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.6
    });
    
    this.particles = new THREE.Points(geometry, material);
    this.scene.add(this.particles);
    
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  },
  
  async compress() {
    const input = document.getElementById('input').value;
    if (!input.trim()) {
      this.showToast('Please enter content');
      return;
    }
    
    this.showToast('🗜️ Compressing...');
    
    try {
      const encoder = new TextEncoder();
      const data = encoder.encode(input);
      
      const cs = new CompressionStream('deflate');
      const writer = cs.writable.getWriter();
      writer.write(data);
      writer.close();
      
      const compressedStream = cs.readable;
      const reader = compressedStream.getReader();
      const chunks = [];
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      
      const compressed = new Uint8Array(chunks.reduce((acc, chunk) => acc + chunk.length, 0));
      let offset = 0;
      for (const chunk of chunks) {
        compressed.set(chunk, offset);
        offset += chunk.length;
      }
      
      this.compressedData = compressed;
      this.binaryData = Array.from(compressed).map(byte => byte.toString(2).padStart(8, '0')).join('');
      
      // Convert to symbols using hypercode
      this.convertToSymbols();
      
      // Calculate IKRq score
      const ikrResult = ikrq.score(input);
      this.showIKRq(ikrResult);
      
      // Update stats
      document.getElementById('s-original').textContent = data.length;
      document.getElementById('s-compressed').textContent = compressed.length;
      document.getElementById('s-ratio').textContent = (data.length / compressed.length).toFixed(2) + 'x';
      
      this.showToast('✓ Compressed');
    } catch (e) {
      this.showToast('Compression error: ' + e.message);
    }
  },
  
  convertToSymbols() {
    if (!this.binaryData) return;
    
    const lib = window.Q ? window.Q.lib : null;
    const symbols = [];
    const display = document.getElementById('symbols');
    
    // Map binary chunks to symbols
    const chunkSize = 8;
    for (let i = 0; i < this.binaryData.length; i += chunkSize) {
      const chunk = this.binaryData.substring(i, i + chunkSize);
      const value = parseInt(chunk, 2);
      
      let symbol;
      if (lib) {
        const keys = Object.keys(lib);
        symbol = keys[value % keys.length];
      } else {
        symbol = String.fromCharCode(65 + (value % 26));
      }
      
      symbols.push(symbol);
    }
    
    this.symbolData = symbols;
    
    // Display symbols
    display.innerHTML = symbols.slice(0, 100).map(s => {
      const lib = window.Q ? window.Q.lib : null;
      const data = lib && lib[s] ? lib[s] : { col: '#888' };
      return `<div class="symbol" style="background:${data.col}20; color:${data.col}; border:2px solid ${data.col};" title="${s}">${s}</div>`;
    }).join('') + (symbols.length > 100 ? '<div style="color:var(--muted);padding:8px;">... and ' + (symbols.length - 100) + ' more</div>' : '');
    
    document.getElementById('output').textContent = symbols.join('');
  },
  
  async decompress() {
    if (!this.compressedData) {
      this.showToast('No data to decompress');
      return;
    }
    
    this.showToast('📂 Decompressing...');
    
    try {
      const ds = new DecompressionStream('deflate');
      const writer = ds.writable.getWriter();
      writer.write(this.compressedData);
      writer.close();
      
      const reader = ds.readable.getReader();
      const chunks = [];
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      
      const decompressed = new Uint8Array(chunks.reduce((acc, chunk) => acc + chunk.length, 0));
      let offset = 0;
      for (const chunk of chunks) {
        decompressed.set(chunk, offset);
        offset += chunk.length;
      }
      
      const decoder = new TextDecoder();
      const text = decoder.decode(decompressed);
      
      document.getElementById('output').textContent = text;
      this.showToast('✓ Decompressed');
    } catch (e) {
      this.showToast('Decompression error: ' + e.message);
    }
  },
  
  showIKRq(result) {
    const display = document.getElementById('ikr-display');
    display.style.display = 'block';
    
    document.getElementById('ikr-score').textContent = result.score;
    
    const fibColors = {1:'#FF0000',2:'#FF7F00',3:'#FFFF00',5:'#00FF00',8:'#0000FF',13:'#9400D3',21:'#FFFFFF'};
    const fibNames = {1:'Seed',2:'Connection',3:'Integration',5:'Elements',8:'Directions',13:'Cycles',21:'Completion'};
    const col = fibColors[result.level];
    
    document.getElementById('ikr-level').innerHTML = `<span style="color:${col};">Level ${result.level} · ${fibNames[result.level]}</span>`;
  },
  
  speak() {
    const output = document.getElementById('output').textContent;
    if (!output || output === 'Waiting for input...') {
      this.showToast('No output to speak');
      return;
    }
    voice.speak(output);
  },
  
  visualize() {
    this.showToast('🌊 Graph Wonder activated');
    // Animate camera
    const targetZ = this.camera.position.z === 50 ? 30 : 50;
    const animate = () => {
      const diff = targetZ - this.camera.position.z;
      if (Math.abs(diff) > 0.1) {
        this.camera.position.z += diff * 0.05;
        requestAnimationFrame(animate);
      }
    };
    animate();
  },
  
  analyze() {
    const input = document.getElementById('input').value;
    if (!input.trim()) {
      this.showToast('Please enter content');
      return;
    }
    
    const words = input.split(/\s+/).length;
    const chars = input.length;
    const lines = input.split('\n').length;
    
    const output = `Analysis:
Words: ${words}
Characters: ${chars}
Lines: ${lines}
Compression: ${(chars / (this.compressedData?.length || chars)).toFixed(2)}x`;
    
    document.getElementById('output').textContent = output;
    this.showToast('✓ Analysis complete');
  },
  
  loadSample() {
    document.getElementById('input').value = 'The individual self encompasses body, mind, and spirit. Society and community form the fabric of human connection. Econology integrates ecological sustainability with economic systems. Earth engineering shapes our physical environment through architecture and infrastructure. Discovery drives scientific exploration and understanding. Innovation creates new possibilities through art, technology, and creativity. Co-creation and collaboration amplify collective potential. Liberation represents the ultimate freedom of consciousness.';
    this.showToast('✓ Sample loaded');
  },
  
  clear() {
    document.getElementById('input').value = '';
    document.getElementById('output').textContent = 'Waiting for input...';
    document.getElementById('symbols').innerHTML = '';
    document.getElementById('ikr-display').style.display = 'none';
    this.compressedData = null;
    this.binaryData = null;
    this.symbolData = null;
    this.showToast('✓ Cleared');
  },
  
  showStats() {
    const lib = window.Q ? window.Q.lib : null;
    const symbolCount = lib ? Object.keys(lib).length : 0;
    this.showToast(`📊 ${symbolCount} symbols available`);
  },
  
  exportAll() {
    const data = {
      input: document.getElementById('input').value,
      output: document.getElementById('output').textContent,
      symbols: this.symbolData,
      compressed: this.compressedData ? Array.from(this.compressedData) : null,
      timestamp: new Date().toISOString()
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `khelo-export-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    this.showToast('✓ Exported');
  },
  
  help() {
    this.showToast('🌌 Khel.o: Type/speak → Compress → Symbols → IKRq → Decompress');
  },
  
  showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  },
  
  animate() {
    requestAnimationFrame(() => this.animate());
    
    if (this.particles) {
      this.particles.rotation.x += 0.0005;
      this.particles.rotation.y += 0.001;
    }
    
    this.renderer.render(this.scene, this.camera);
  }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  engine.init();
});
</script>
