        // Database Layer
        class KhelaDB {
            constructor() {
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        if (!db.objectStoreNames.contains('books')) {
                            db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('profiles')) {
                            db.createObjectStore('profiles', { keyPath: 'userId' });
                        }
                        if (!db.objectStoreNames.contains('connections')) {
                            db.createObjectStore('connections', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            async addBook(book) {
                return this._tx('books', 'readwrite', store => store.add(book));
            }

            async getAllBooks() {
                return this._tx('books', 'readonly', store => store.getAll());
            }

            async saveProfile(profile) {
                return this._tx('profiles', 'readwrite', store => store.put(profile));
            }

            async getProfile(userId) {
                return this._tx('profiles', 'readonly', store => store.get(userId));
            }

            _tx(storeName, mode, callback) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([storeName], mode);
                    const store = tx.objectStore(storeName);
                    const request = callback(store);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // API Integrations
        class KnowledgeAPI {
            // Amazon Product Search (using PA-API or scraping alternative)
            static async searchAmazon(query) {
                // Note: Amazon PA-API requires server-side. 
                // For client-side, we use a proxy or direct search
                const searchUrl = `https://www.amazon.com/s?k=${encodeURIComponent(query)}&tag=${CONFIG.AMAZON_TAG}`;
                
                // For demo, we'll create affiliate links manually
                return {
                    searchUrl,
                    getAffiliateLink(asin) {
                        return `https://www.amazon.com/dp/${asin}/?tag=${CONFIG.AMAZON_TAG}`;
                    }
                };
            }

            // OpenAlex Academic Search
            static async searchOpenAlex(query, limit = 20) {
                try {
                    const response = await fetch(
                        `https://api.openalex.org/works?search=${encodeURIComponent(query)}&per_page=${limit}`
                    );
                    const data = await response.json();
                    return data.results.map(work => ({
                        type: 'scholar',
                        title: work.title,
                        authors: work.authorships?.map(a => a.author.display_name).join(', ') || 'Unknown',
                        published: work.publication_date?.substring(0, 4) || 'N/A',
                        abstract: work.abstract_inverted_index ? 
                            Object.keys(work.abstract_inverted_index).join(' ') : 
                            'No abstract available',
                        doi: work.doi,
                        url: work.doi ? `https://doi.org/${work.doi}` : work.url,
                        openAccess: work.open_access?.is_oa || false
                    }));
                } catch (error) {
                    console.error('OpenAlex error:', error);
                    return [];
                }
            }

            // Unpaywall Open Access
            static async getUnpaywall(doi) {
                try {
                    const response = await fetch(`https://api.unpaywall.org/v2/${doi}?email=${CONFIG.ADMIN_EMAIL}`);
                    const data = await response.json();
                    return data.best_oa_location?.url || null;
                } catch (error) {
                    return null;
                }
            }

            // GitHub Repository Search
            static async searchGitHub(query, limit = 20) {
                try {
                    const response = await fetch(
                        `https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&per_page=${limit}&sort=stars&order=desc`
                    );
                    const data = await response.json();
                    return data.items.map(repo => ({
                        type: 'github',
                        title: repo.full_name,
                        description: repo.description || 'No description',
                        language: repo.language || 'Unknown',
                        stars: repo.stargazers_count,
                        forks: repo.forks_count,
                        url: repo.html_url,
                        homepage: repo.homepage
                    }));
                } catch (error) {
                    console.error('GitHub error:', error);
                    return [];
                }
            }

            // Google Books Search
            static async searchGoogleBooks(query) {
                try {
                    const response = await fetch(
                        `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=20`
                    );
                    const data = await response.json();
                    return (data.items || []).map(book => {
                        const info = book.volumeInfo;
                        const asin = book.id; // Use Google Books ID
                        return {
                            type: 'amazon',
                            title: info.title,
                            authors: info.authors?.join(', ') || 'Unknown',
                            published: info.publishedDate?.substring(0, 4) || 'N/A',
                            description: info.description?.substring(0, 400) || 'No description',
                            thumbnail: info.imageLinks?.thumbnail,
                            amazonLink: `https://www.amazon.com/s?k=${encodeURIComponent(info.title)}&tag=${CONFIG.AMAZON_TAG}`,
                            infoLink: info.infoLink
                        };
                    });
                } catch (error) {
                    console.error('Google Books error:', error);
                    return [];
                }
            }
        }

        // AI Networking Engine
        class AINetworkEngine {
            constructor(provider, apiKey) {
                this.provider = provider;
                this.apiKey = apiKey;
                this.endpoint = this.getEndpoint(provider);
            }

            getEndpoint(provider) {
                const endpoints = {
                    'openai': 'https://api.openai.com/v1/chat/completions',
                    'gemini': `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${this.apiKey}`,
                    'qwen': 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation',
                    'claude': 'https://api.anthropic.com/v1/messages',
                    'deepseek': 'https://api.deepseek.com/v1/chat/completions'
                };
                return endpoints[provider] || endpoints.openai;
            }

            async buildProfile(userData) {
                const prompt = this.buildProfilePrompt(userData);
                
                const response = await this.callAI(prompt);
                return this.parseProfileResponse(response);
            }

            async findMatches(userProfile, candidateProfiles) {
                const prompt = this.buildMatchingPrompt(userProfile, candidateProfiles);
                const response = await this.callAI(prompt);
                return this.parseMatchesResponse(response);
            }

            async callAI(prompt) {
                const headers = {
                    'Content-Type': 'application/json'
                };

                if (this.provider === 'openai' || this.provider === 'deepseek') {
                    headers['Authorization'] = `Bearer ${this.apiKey}`;
                } else if (this.provider === 'claude') {
                    headers['x-api-key'] = this.apiKey;
                    headers['anthropic-version'] = '2023-06-01';
                }

                const body = this.prepareRequestBody(prompt);

                const response = await fetch(this.endpoint, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                return this.extractContent(data);
            }

            buildProfilePrompt(userData) {
                return `Analyze this person's digital footprint and create a comprehensive profile:

Social Links:
${JSON.stringify(userData.socialLinks, null, 2)}

Interests: ${userData.interests?.join(', ') || 'Not specified'}
Goals: ${userData.goals || 'Not specified'}

Create a structured profile with:
1. Core expertise areas (technical skills, domains)
2. Passion projects and interests
3. Collaboration style
4. Missing collaborators (what expertise they need)
5. Similar people/organizations they should connect with

Format as JSON.`;
            }

            buildMatchingPrompt(userProfile, candidates) {
                return `Find the best collaboration matches for this person:

User Profile:
${JSON.stringify(userProfile, null, 2)}

Candidate Profiles:
${JSON.stringify(candidates, null, 2)}

For each candidate, provide:
1. Match score (0-100)
2. Reasons for match (specific shared interests, complementary skills)
3. Collaboration potential (what they could work on together)
4. Confidence level

Format as JSON with array of matches.`;
            }

            prepareRequestBody(prompt) {
                if (this.provider === 'gemini') {
                    return {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 2048
                        }
                    };
                } else if (this.provider === 'claude') {
                    return {
                        model: 'claude-3-sonnet-20240229',
                        max_tokens: 2048,
                        messages: [{ role: 'user', content: prompt }]
                    };
                } else {
                    // OpenAI, DeepSeek, Qwen
                    return {
                        model: this.provider === 'openai' ? 'gpt-4' : 
                               this.provider === 'qwen' ? 'qwen-max' : 'deepseek-chat',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.7,
                        max_tokens: 2048
                    };
                }
            }

            extractContent(data) {
                if (this.provider === 'gemini') {
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                } else if (this.provider === 'claude') {
                    return data.content?.[0]?.text || '';
                } else {
                    return data.choices?.[0]?.message?.content || '';
                }
            }

            parseProfileResponse(text) {
                try {
                    const json = text.match(/\{[\s\S]*\}/)?.[0] || '{}';
                    return JSON.parse(json);
                } catch (e) {
                    console.error('Profile parsing error:', e);
                    return {};
                }
            }

            parseMatchesResponse(text) {
                try {
                    const json = text.match(/\[[\s\S]*\]/)?.[0] || '[]';
                    return JSON.parse(json);
                } catch (e) {
                    console.error('Matches parsing error:', e);
                    return [];
                }
            }
        }

        // Napkin AI Integration

            async createDiagram(text, style = 'default') {
                // Napkin AI API integration
                const response = await fetch(`${this.baseUrl}/v1/diagrams`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${this.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text,
                        style,
                        format: 'svg'
                    })
                });
                
                const data = await response.json();
                return data.svg || data.url;
            }
        }

            renderSearch() {
                return `
                    <div class="search-hero">
                        <h1>Universal Search</h1>
                        <p style="color: var(--text-secondary);">Search across Amazon, OpenAlex, GitHub, and more</p>
                    </div>

                    <div class="search-tabs">
                        <div class="search-tab active" data-source="all">All Sources</div>
                        <div class="search-tab" data-source="amazon">📚 Amazon Books</div>
                        <div class="search-tab" data-source="scholar">🎓 OpenAlex</div>
                        <div class="search-tab" data-source="github">💻 GitHub</div>
                    </div>

                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="Enter your search query...">
                    </div>

                    <div id="searchResults" class="results-grid"></div>
                `;
            }

            setupSearchListeners() {
                const tabs = document.querySelectorAll('.search-tab');
                const input = document.getElementById('searchInput');
                
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                    });
                });

                input.addEventListener('keypress', async (e) => {
                    if (e.key === 'Enter') {
                        await this.performSearch(input.value);
                    }
                });
            }

            async performSearch(query) {
                const source = document.querySelector('.search-tab.active').dataset.source;
                const resultsDiv = document.getElementById('searchResults');
                
                resultsDiv.innerHTML = '<div class="loading"></div>';
                
                let results = [];
                
                if (source === 'all' || source === 'amazon') {
                    const books = await KnowledgeAPI.searchGoogleBooks(query);
                    results = results.concat(books);
                }
                
                if (source === 'all' || source === 'scholar') {
                    const papers = await KnowledgeAPI.searchOpenAlex(query);
                    results = results.concat(papers);
                }
                
                if (source === 'all' || source === 'github') {
                    const repos = await KnowledgeAPI.searchGitHub(query);
                    results = results.concat(repos);
                }
                
                this.displaySearchResults(results);
            }

            displaySearchResults(results) {
                const resultsDiv = document.getElementById('searchResults');
                
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No results found</p>';
                    return;
                }
                
                resultsDiv.innerHTML = results.map(result => {
                    if (result.type === 'amazon') {
                        return `
                            <div class="result-card amazon">
                                ${result.thumbnail ? `<img src="${result.thumbnail}" style="width: 100px; float: right; margin-left: 16px;">` : ''}
                                <div class="result-title">${result.title}</div>
                                <div class="result-meta">${result.authors} • ${result.published}</div>
                                <div class="result-desc">${result.description}</div>
                                <div class="result-actions">
                                    <a href="${result.amazonLink}" target="_blank" class="btn btn-amazon" rel="nofollow sponsored">
                                        Buy on Amazon
                                    </a>
                                    ${result.infoLink ? `<a href="${result.infoLink}" target="_blank" class="btn">Preview</a>` : ''}
                                </div>
                            </div>
                        `;
                    } else if (result.type === 'scholar') {
                        return `
                            <div class="result-card scholar">
                                <div class="result-title">${result.title}</div>
                                <div class="result-meta">${result.authors} • ${result.published}</div>
                                <div class="result-desc">${result.abstract}</div>
                                <div class="result-actions">
                                    <a href="${result.url}" target="_blank" class="btn btn-scholar">
                                        ${result.openAccess ? 'Open Access' : 'View Paper'}
                                    </a>
                                    ${result.doi ? `<a href="https://doi.org/${result.doi}" target="_blank" class="btn">DOI</a>` : ''}
                                </div>
                            </div>
                        `;
                    } else if (result.type === 'github') {
                        return `
                            <div class="result-card github">
                                <div class="result-title">${result.title}</div>
                                <div class="result-meta">${result.language} • ⭐ ${result.stars} • 🔀 ${result.forks}</div>
                                <div class="result-desc">${result.description}</div>
                                <div class="result-actions">
                                    <a href="${result.url}" target="_blank" class="btn btn-github">
                                        View on GitHub
                                    </a>
                                    ${result.homepage ? `<a href="${result.homepage}" target="_blank" class="btn">Website</a>` : ''}
                                </div>
                            </div>
                        `;
                    }
                    return '';
                }).join('');
            }

            setupNetworkListeners() {

            async buildProfile() {
                const provider = document.getElementById('aiProvider').value;
                const apiKey = document.getElementById('apiKey').value;
                
                if (!apiKey) {
                    alert('Please enter your API key');
                    return;
                }

                const userData = {
                    socialLinks: {
                        github: document.getElementById('socialGithub').value,
                        linkedin: document.getElementById('socialLinkedin').value,
                        twitter: document.getElementById('socialTwitter').value,
                        youtube: document.getElementById('socialYoutube').value,
                        website: document.getElementById('socialWebsite').value
                    },
                    interests: document.getElementById('userInterests').value.split(',').map(s => s.trim()),
                    goals: document.getElementById('userInterests').value
                };

                const resultsDiv = document.getElementById('networkResults');
                resultsDiv.innerHTML = '<div class="loading"></div> Building your profile...';

                try {
                    const engine = new AINetworkEngine(provider, apiKey);
                    const profile = await engine.buildProfile(userData);
                    
                    // Save profile
                    await this.db.saveProfile({
                        userId: Date.now().toString(),
                        ...userData,
                        profile,
                        createdAt: new Date().toISOString()
                    });

                    // Find matches (demo - in production, search against database of users)
                    const matches = await engine.findMatches(profile, []);
                    
                    this.displayNetworkResults(profile, matches);
                } catch (error) {
                    resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                }
            }

            displayNetworkResults(profile, matches) {
                const resultsDiv = document.getElementById('networkResults');
                
                let html = `
                    <h3 style="margin: 30px 0 20px;">Your AI Profile</h3>
                    <pre style="background: var(--bg-glass); padding: 20px; border-radius: 8px; overflow-x: auto;">
${JSON.stringify(profile, null, 2)}
                    </pre>
                `;

                if (matches && matches.length > 0) {
                    html += '<h3 style="margin: 30px 0 20px;">Recommended Connections</h3>';
                    html += matches.map(match => `
                        <div class="match-card">
                            <div class="match-score">${match.score}% Match</div>
                            <h4>${match.name || 'Potential Collaborator'}</h4>
                            <p style="color: var(--text-secondary);">${match.reason}</p>
                            <ul class="match-reasons">
                                ${match.reasons.map(r => `<li>${r}</li>`).join('')}
                            </ul>
                            <div class="result-actions" style="margin-top: 16px;">
                                ${match.socialLinks?.github ? `<a href="${match.socialLinks.github}" target="_blank" class="btn btn-github">GitHub</a>` : ''}
                                ${match.socialLinks?.linkedin ? `<a href="${match.socialLinks.linkedin}" target="_blank" class="btn">LinkedIn</a>` : ''}
                            </div>
                        </div>
                    `).join('');
                }

                resultsDiv.innerHTML = html;
            }

            async createNapkinDiagram() {
                const text = document.getElementById('napkinText').value;
                const output = document.getElementById('napkinOutput');
                
                if (!text) {
                    alert('Please enter text to visualize');
                    return;
                }

                output.innerHTML = '<div class="loading"></div>';

                try {
                    const napkin = new NapkinAI(CONFIG.NAPKIN_API_TOKEN);
                    const svg = await napkin.createDiagram(text);
                    output.innerHTML = svg;
                } catch (error) {
                    output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                }
            }

                await this.db.addBook(contribution);
                
                alert('Thank you for your contribution! It will be reviewed and added to the platform.');
                
                // Clear form

                document.getElementById('contributeUrl').value = '';
                document.getElementById('contributeCover').value = '';
