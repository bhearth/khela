<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Khel.o · Magical Flower Universe</title>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  background:#010204; color:#e2e8f0;
  font-family:'Space Grotesk',system-ui,sans-serif;
  overflow:hidden; touch-action:none; user-select:none;
  height:100dvh;width:100dvw;
  background-image: radial-gradient(circle at center, #0a1128 0%, #010204 100%);
}

/* ── HUD telemetry ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:clamp(12px,3vw,20px);
  pointer-events:none;z-index:50;
  background:linear-gradient(180deg,rgba(1,2,4,0.92) 60%,transparent);
}
.telemetry{
  font-size:clamp(10px,2.5vw,13px);letter-spacing:3px;
  text-transform:uppercase;color:#38bdf8;
  text-shadow:0 0 10px rgba(56,189,248,0.6);font-weight:700;
  line-height:1.6;
}
.coords{
  font-size:clamp(9px,2vw,11px);color:#94a3b8;
  text-align:right;letter-spacing:2px;line-height:1.7;
}
.hint{font-size:clamp(8px,1.8vw,10px);color:#475569;letter-spacing:1px;}

/* ── Bottom toolbar ── */
#toolbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-around;align-items:center;
  padding:clamp(8px,2.5vw,14px) 8px clamp(14px,4vw,26px);
  background:linear-gradient(0deg,rgba(1,2,4,0.97) 75%,transparent);
  z-index:50;gap:6px;pointer-events:auto;
}
.tb{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:10px 14px;cursor:pointer;flex:1;max-width:90px;
  transition:background .2s,transform .2s cubic-bezier(0.34, 1.56, 0.64, 1); backdrop-filter: blur(10px);
}
.tb:active{background:rgba(255,255,255,0.12);transform:scale(0.85);}
.tb .em{font-size:clamp(22px,6vw,30px);line-height:1;}
.tb .lb{font-size:clamp(8px,2vw,10px);color:#94a3b8;letter-spacing:.5px;
        text-transform:uppercase;font-weight:700;}

/* ── Viewport ── */
#viewport{position:absolute;top:50dvh;left:50dvw;z-index:10;}
#hub{position:absolute;top:0;left:0;transform-style:preserve-3d;will-change:transform;}

/* ── SVG constellation lines (Vines) ── */
svg{
  position:absolute; top:-10000px;left:-10000px;
  width:20000px;height:20000px; pointer-events:none;
  transform-style:preserve-3d;
}
.stellar-path{
  fill:none;stroke-width:2.5;stroke-linecap:round;
  filter:drop-shadow(0 0 6px currentColor);
  stroke-dasharray:2000;stroke-dashoffset:2000;
  animation:growVine 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
@keyframes growVine{to{stroke-dashoffset:0}}

/* ── Fibonacci Flower Dots (The AllPages Nodes) ── */
.dot{
  position:absolute;border-radius:50%;cursor:pointer;
  transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z));
  transition:transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .3s,background .3s;
  will-change:transform; pointer-events:auto;
  min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}
.dot .hit{
  border-radius:50%;background:var(--col);
  width:var(--sz);height:var(--sz);
  box-shadow:0 0 15px var(--col);
  transition:transform .3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .3s;
}
.dot:hover .hit,.dot:active .hit{
  transform:scale(2.8);
  box-shadow:0 0 30px var(--col), 0 0 60px var(--col);
  z-index:100;
}
.dot .title-label {
  position: absolute; top: 18px; font-size: 10px; font-weight: bold; color: #fff; opacity: 0; pointer-events: none;
  white-space: nowrap; text-shadow: 0 2px 5px #000, 0 0 10px var(--col); transition: opacity 0.3s;
}
.dot:hover .title-label { opacity: 1; }
.dot.dimmed { opacity: 0.1; filter: grayscale(100%); pointer-events: none; }

/* ── Kids Magical Bloom Nodes (Drill down nodes) ── */
.jnode{
  position:absolute;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;text-align:center;
  background:rgba(10,15,25,0.7);border:2px solid;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0);
  animation:supernova 0.8s cubic-bezier(.34,1.56,.64,1) forwards;
  will-change:transform; pointer-events:auto;
}
.jnode:hover,.jnode:active{
  background:currentColor!important;color:#000!important;
  box-shadow:0 0 40px currentColor,inset 0 0 20px #fff;z-index:500;
  transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),calc(var(--z) + 50px)) scale(1.3)!important;
}
.jnode .ji{
  font-size:clamp(20px,5vw,32px);
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
  transition:transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);line-height:1;
}
.jnode:hover .ji{transform:scale(1.3) rotate(10deg);}
.jnode .jl{
  font-size:clamp(8px,2vw,11px);font-weight:800;
  text-transform:uppercase;letter-spacing:1px;
  margin-top:6px;pointer-events:none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
@keyframes supernova{
    0% { transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0) rotate(-45deg); }
    100% { transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(1) rotate(0deg); }
}

/* ── Loading Spinner ── */
#loading {
  position:fixed; inset:0; background:rgba(1,2,4,0.95); z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.5s; backdrop-filter: blur(5px);
}
.spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin-bottom:20px;}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { color: #f59e0b; font-family: monospace; letter-spacing: 3px; text-transform: uppercase; font-size: 14px; font-weight: bold;}

/* ── Detail sheet (Janm Kundali) ── */
#detail{
  position:fixed;bottom:-100%;left:0;right:0;
  background:rgba(13,22,37,0.95);border-top:2px solid rgba(56,189,248,.5);
  border-radius:32px 32px 0 0;z-index:250;
  padding:clamp(20px,5vw,30px);
  transition:bottom .5s cubic-bezier(.34,1.56,.64,1);
  max-height:75vh;overflow-y:auto; backdrop-filter:blur(25px);
  box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
}
#detail.open{bottom:0;}
#detail .handle{width:50px;height:6px;background:rgba(255,255,255,.2); border-radius:6px;margin:0 auto 20px;}
#d-icon{font-size:clamp(50px,15vw,80px);text-align:center;margin-bottom:10px; animation: bounce 2s infinite;}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

#d-title{font-size:clamp(20px,6vw,28px);color:#fff;font-weight:800;text-align:center;margin:0 0 6px;}
#d-desc{font-size:clamp(12px,3.3vw,14px);color:#94a3b8;text-align:center;line-height:1.6;margin:0 0 20px;}

/* Janm Kundali Grid for Kids */
.k-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 25px; }
.k-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
.k-box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
.k-val { font-size: 28px; font-weight: 800; font-family: 'Space Grotesk'; }
.k-lbl { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

#d-links{display:flex; justify-content: center;}
.d-link{
  display:inline-flex;align-items:center;justify-content:center; gap:10px;
  background:linear-gradient(135deg, #38bdf8, #818cf8); border-radius:20px;padding:16px 30px;color:#000;
  text-decoration:none;font-size:clamp(14px,4vw,16px);font-weight:800; text-transform:uppercase;
  transition:transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .2s;
  box-shadow: 0 10px 20px rgba(56,189,248,0.4);
}
.d-link:active{transform:scale(0.9);}
.d-close{position: absolute; top: 20px; right: 25px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;}
.d-close:hover { background: #ef4444; }

/* ── Search overlay ── */
#search-overlay{ position:fixed;inset:0;background:rgba(1,2,4,.97); backdrop-filter:blur(16px);z-index:300; display:none;flex-direction:column; padding:clamp(16px,5vw,32px); animation:fadeUp .25s ease; }
#search-overlay.active{display:flex;}
#search-wrap{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
#search-input{ flex:1;background:rgba(255,255,255,0.05); border:2px solid rgba(56,189,248,.35);border-radius:50px; padding:clamp(12px,3.5vw,16px) 20px;color:#fff; font-size:clamp(16px,4.5vw,20px);outline:none;font-family:inherit;font-weight:600; }
#search-close{ width:clamp(44px,12vw,54px);height:clamp(44px,12vw,54px); border-radius:50%;background:rgba(255,255,255,0.07); border:none;color:#94a3b8;font-size:20px;cursor:pointer;flex-shrink:0; }
#search-results{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;}
.s-card{ display:flex;align-items:center;gap:14px; background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07); border-radius:18px;padding:clamp(12px,3.5vw,18px);cursor:pointer; animation:fadeUp .3s both;transition:background .2s; }
.s-card:active{background:rgba(255,255,255,0.09);}
.s-em{font-size:clamp(24px,6vw,30px);flex-shrink:0;}
.s-body h3{margin:0 0 3px;font-size:clamp(14px,4vw,18px);color:#fff;font-weight:700;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

</style>
</head>
<body>

<!-- ── HUD ── -->
<div id="hud">
  <div class="telemetry">
    <div id="status">✨ Awakening Knowledge</div>
    <div id="path-log" style="font-size:9px;color:#64748b;letter-spacing:2px;margin-top:4px;">Miraheze Universe</div>
  </div>
  <div class="coords">
    <div id="coord-display">Z: 1.000</div>
    <div class="hint">DOUBLE-TAP TO RESET</div>
  </div>
</div>

<!-- ── 3D Viewport ── -->
<div id="viewport"><div id="hub"><svg id="lines"></svg></div></div>

<!-- ── Loading Overlay ── -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Planting Magic Seeds...</div>
</div>

<!-- ── Bottom Toolbar ── -->
<div id="toolbar">
  <div class="tb" onclick="openSearch()"><span class="em">🔍</span><span class="lb">Search</span></div>
  <div class="tb" onclick="Engine.resetUniverse()"><span class="em">🌸</span><span class="lb">Flower</span></div>
  <div class="tb" onclick="Engine.rollSurprise()"><span class="em">🎲</span><span class="lb">Jump</span></div>
  <div class="tb" onclick="alert('Voice search active soon!')"><span class="em" id="v-icon">👂</span><span class="lb">Voice</span></div>
</div>

<!-- ── Search ── -->
<div id="search-overlay">
  <div id="search-wrap">
    <input id="search-input" type="search" placeholder="Find a Magical Page..." autocomplete="off" oninput="runSearch(this.value)">
    <button id="search-close" onclick="closeSearch()">✕</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- ── Detail Sheet (Kids Janm Kundali Viewer) ── -->
<div id="detail">
  <div class="handle" onclick="closeDetail()"></div>
  <button class="d-close" onclick="closeDetail()">✕</button>
  
  <div id="d-icon">📄</div>
  <div id="d-title">Node Title</div>
  <div id="d-desc">Magical Data Profile</div>
  
  <!-- The Janm Kundali Grid -->
  <div class="k-grid" id="k-grid-container" style="display:none;">
      <div class="k-box"><div class="k-val" id="k-words" style="color: #38bdf8;">0</div><div class="k-lbl">Words</div></div>
      <div class="k-box"><div class="k-val" id="k-links" style="color: #10b981;">0</div><div class="k-lbl">Links</div></div>
      <div class="k-box"><div class="k-val" id="k-media" style="color: #f59e0b;">0</div><div class="k-lbl">Images</div></div>
      <div class="k-box"><div class="k-val" id="k-cats" style="color: #c084fc;">0</div><div class="k-lbl">Categories</div></div>
  </div>

  <div id="d-links"></div>
</div>

<script>
// ============================================================================
// THE ENGINE: MIRAHEZE API + MAGICAL PHYLLOTAXIS BLOOM
// ============================================================================

const API_BASE = "https://kids.miraheze.org/w/api.php?origin=*&format=json";
const SVG_O = 10000;

// Kid-friendly magical SVG-like Emojis for the bloomed petals
const MAGICAL_ICONS = ['🌟','🚀','🎈','🎨','🦁','🍎','🌈','🧩','🦋','🧸','🦖','🛸','🌞','🌻','🍄','🐠','🍓','💎','🔮','🎭'];

const Engine = {
  hub: document.getElementById('hub'),
  svg: document.getElementById('lines'),
  allPages: [],
  dots: [], // The main flower dots
  jnodes: [], // Drill-down magical petals
  
  // Camera Physics
  cam: { x: 0, y: 0, z: window.innerWidth < 768 ? 0.2 : 0.5, rx: 0, ry: 0 },
  tgt: { x: 0, y: 0, z: window.innerWidth < 768 ? 0.2 : 0.5, rx: 0, ry: 0 },
  isMobile: window.innerWidth < 768,

  async init() {
    this.setupGestures();
    this.startRenderLoop();
    await this.fetchAllPages();
  },

  updateStatus(msg) { document.getElementById('status').innerText = msg; },

  async fetchAllPages() {
    try {
      const res = await fetch(`${API_BASE}&action=query&list=allpages&aplimit=400`);
      const data = await res.json();
      this.allPages = data.query.allpages; // Array of {pageid, title}
      
      document.getElementById('loading').style.opacity = 0;
      setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
      
      this.updateStatus(`🌸 ${this.allPages.length} Pages Blooming`);
      this.buildFlower();
    } catch(e) {
      console.error(e);
      document.getElementById('loading-msg').innerText = "API Connection Failed";
    }
  },

  // 1. Build the Main Flower (All Pages - The Universe)
  buildFlower() {
    this.dots.forEach(d => d.remove()); this.dots.length = 0;
    this.clearExpansion();

    const c = this.isMobile ? 22 : 35; // Scaling factor

    this.allPages.forEach((page, i) => {
      // Fibonacci Phyllotaxis Math
      const angle = i * 137.508 * (Math.PI / 180);
      const r = c * Math.sqrt(i);
      const x = r * Math.cos(angle);
      const y = r * Math.sin(angle);
      const z = Math.sin(i * 0.1) * 60; // Beautiful 3D ripple
      
      // Beautiful HSL Color Gradient based on index
      const hue = (i * 3.5) % 360;
      const color = `hsl(${hue}, 85%, 60%)`;
      const sz = Math.max(3, Math.min(8, 4 + i/100)); // Size grows slightly

      const el = document.createElement('div');
      el.className = 'dot';
      el.style.cssText = `--x:${x}px; --y:${y}px; --z:${z}px; --col:${color}; --sz:${sz}px;`;
      el.innerHTML = `<div class="hit"></div><div class="title-label" style="--col:${color}">${page.title}</div>`;
      
      el.onclick = (e) => {
        e.stopPropagation();
        this.expandPage(el, page, x, y, z, color, hue);
      };

      this.hub.appendChild(el);
      this.dots.push(el);
    });
  },

  // 2. Drill Down: The Magical Blooming Flower Output + Janm Kundali
  async expandPage(dotEl, pageData, px, py, pz, pColor, baseHue) {
    this.clearExpansion();
    
    // Dim the rest of the flower
    this.dots.forEach(d => { if(d !== dotEl) d.classList.add('dimmed'); });
    
    // Zoom into the clicked node
    this.tgt.x = -px; this.tgt.y = -py;
    this.tgt.z = this.isMobile ? 0.8 : 1.4;
    this.updateStatus(`📡 Extracting Magic: ${pageData.title}`);
    document.getElementById('path-log').innerText = `Miraheze > ${pageData.title}`;

    try {
      // Fetch Detailed Page Data (Text, Links, Images, Categories) for the Janm Kundali
      const res = await fetch(`${API_BASE}&action=parse&pageid=${pageData.pageid}&prop=links|images|categories|text`);
      const data = await res.json();
      const parse = data.parse;

      // Extract Site Data (Kundali Metrics)
      let links = [];
      if(parse && parse.links) { links = parse.links.filter(l => l.ns === 0).slice(0, 30); } // Max 30 petals
      
      const textStr = parse.text ? parse.text['*'].replace(/<[^>]*>?/gm, '') : "";
      const wordCount = textStr.split(/\s+/).filter(w => w.length > 2).length;
      const imgCount = parse.images ? parse.images.length : 0;
      const catCount = parse.categories ? parse.categories.length : 0;

      // Show Janm Kundali Detail Sheet
      const url = `https://kids.miraheze.org/wiki/${encodeURIComponent(pageData.title)}`;
      this.openDetail(pageData.title, url, { words: wordCount, links: links.length, imgs: imgCount, cats: catCount });

      if(links.length === 0) {
        this.updateStatus(`📄 Isolated Magic Node Reached`);
        return;
      }

      this.updateStatus(`🌸 Blooming ${links.length} Magical Petals`);

      // Spawn child nodes in a beautiful Golden Spiral (Phyllotaxis Blooming Flower)
      links.forEach((link, i) => {
        // Child Phyllotaxis Math
        const angle = i * 137.508 * (Math.PI / 180);
        // Create a hollow center so they bloom around the parent dot
        const c = this.isMobile ? 40 : 55;
        const r = c * Math.sqrt(i + 1) + (this.isMobile ? 60 : 100); 
        
        const x = px + Math.cos(angle) * r;
        const y = py + Math.sin(angle) * r;
        const z = pz + Math.sin(i * 0.6) * 50; // Depth wave for petals
        const sz = this.isMobile ? 55 : 75;

        // Dynamic Color for petals matching the parent's hue family
        const petalHue = (baseHue + (i * 15)) % 360;
        const petalColor = `hsl(${petalHue}, 90%, 65%)`;

        // Select a perfect SVG-like Emoji symbol for Kindergarten Wow
        const icon = MAGICAL_ICONS[i % MAGICAL_ICONS.length];

        // Draw Magical Glowing Vine (SVG Line)
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const mx = (px + x) / 2 - (y - py) * 0.2 + SVG_O;
        const my = (py + y) / 2 + (x - px) * 0.2 + SVG_O;
        path.setAttribute("d", `M${px+SVG_O} ${py+SVG_O} Q${mx} ${my} ${x+SVG_O} ${y+SVG_O}`);
        path.setAttribute("class", "stellar-path");
        path.style.stroke = petalColor;
        path.style.strokeOpacity = "0.6";
        path.style.animationDelay = `${i * 0.05}s`;
        this.svg.appendChild(path);

        // Child Petal Node
        const el = document.createElement('div');
        el.className = 'jnode';
        el.style.cssText = `--x:${x}px; --y:${y}px; --z:${z}px; width:${sz}px; height:${sz}px; color:${petalColor}; border-color:${petalColor}; animation-delay:${i * 0.06}s;`;
        
        // Extract a short label
        const shortName = link['*'].length > 15 ? link['*'].substring(0, 13) + '..' : link['*'];
        el.innerHTML = `<div class="ji">${icon}</div><div class="jl" style="color:${petalColor}">${shortName}</div>`;
        
        el.onclick = (e) => {
          e.stopPropagation();
          const childUrl = `https://kids.miraheze.org/wiki/${encodeURIComponent(link['*'])}`;
          // Show minimal detail for children without fetching deep metrics to save load
          this.openDetail(link['*'], childUrl, null, icon);
          // Auto-zoom to this child petal
          this.tgt.x = -x; this.tgt.y = -y; this.tgt.z = this.isMobile ? 1.2 : 1.8;
        };

        this.hub.appendChild(el);
        this.jnodes.push(el);
      });

    } catch(e) {
      this.updateStatus(`⚠️ Error blooming petals`);
      console.error(e);
    }
  },

  clearExpansion() {
    this.jnodes.forEach(n => n.remove());
    this.jnodes.length = 0;
    this.svg.innerHTML = '';
    this.dots.forEach(d => d.classList.remove('dimmed'));
  },

  resetUniverse() {
    this.clearExpansion();
    this.tgt = { x: 0, y: 0, z: this.isMobile ? 0.2 : 0.5, rx: 0, ry: 0 };
    this.updateStatus(`🌸 The Magical Flower`);
    document.getElementById('path-log').innerText = "Miraheze Universe";
  },

  rollSurprise() {
    if(this.dots.length === 0) return;
    const randomDot = this.dots[Math.floor(Math.random() * this.dots.length)];
    randomDot.click();
  },

  // 3. Kids "Janm Kundali" Viewer
  openDetail(title, url, metrics, icon = '📄') {
    document.getElementById('d-title').innerText = title;
    document.getElementById('d-icon').innerText = icon;
    
    const grid = document.getElementById('k-grid-container');
    if (metrics) {
        document.getElementById('d-desc').innerText = "Page Data Profile (Janm Kundali)";
        document.getElementById('k-words').innerText = metrics.words.toLocaleString();
        document.getElementById('k-links').innerText = metrics.links.toLocaleString();
        document.getElementById('k-media').innerText = metrics.imgs.toLocaleString();
        document.getElementById('k-cats').innerText = metrics.cats.toLocaleString();
        grid.style.display = 'grid';
    } else {
        document.getElementById('d-desc').innerText = "Magical Petal Connection";
        grid.style.display = 'none';
    }

    document.getElementById('d-links').innerHTML = `
      <a class="d-link" href="${url}" target="_blank">🚀 Launch to Page</a>
    `;
    document.getElementById('detail').classList.add('open');
  },

  // 4. Gestures & Rendering (v5.1 Logic)
  setupGestures() {
    const vp = document.getElementById('viewport');
    
    let drag = false, lx, ly, startX, startY;
    let pinchDist = 0;
    let lastTap = 0;

    vp.onpointerdown = e => {
      const now = Date.now();
      if(now - lastTap < 300){ this.resetUniverse(); lastTap = 0; return; }
      lastTap = now;
      drag = true; lx = e.clientX; ly = e.clientY; startX = lx; startY = ly;
    };
    
    vp.onpointermove = e => {
      if(!drag) return;
      const dx = e.clientX - lx, dy = e.clientY - ly;
      const moved = Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5;
      if(moved){
        if(e.shiftKey || e.buttons === 2){ this.tgt.ry += dx*0.3; this.tgt.rx -= dy*0.3; }
        else { this.tgt.x += dx/this.cam.z; this.tgt.y += dy/this.cam.z; }
      }
      lx = e.clientX; ly = e.clientY;
    };
    
    vp.onpointerup = () => drag = false;
    vp.oncontextmenu = e => e.preventDefault();
    vp.onwheel = e => { this.tgt.z = Math.max(0.05, Math.min(5, this.tgt.z - e.deltaY * 0.0015)); };
    
    // Mobile Pinch
    vp.addEventListener('touchstart', e => {
      if(e.touches.length === 2){ drag = false; pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
    }, {passive:true});
    vp.addEventListener('touchmove', e => {
      if(e.touches.length === 2){
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        this.tgt.z = Math.max(0.05, Math.min(5, this.tgt.z + (d - pinchDist)*0.004));
        pinchDist = d;
      }
    }, {passive:true});
  },

  lerp(a, b, t) { return a + (b - a) * t; },

  startRenderLoop() {
    const loop = () => {
      const f = 0.08;
      this.cam.x = this.lerp(this.cam.x, this.tgt.x, f);
      this.cam.y = this.lerp(this.cam.y, this.tgt.y, f);
      this.cam.z = this.lerp(this.cam.z, this.tgt.z, f);
      this.cam.rx = this.lerp(this.cam.rx, this.tgt.rx, f);
      this.cam.ry = this.lerp(this.cam.ry, this.tgt.ry, f);

      this.hub.style.transform = `translate(-50%,-50%) scale(${this.cam.z}) translate3d(${this.cam.x}px,${this.cam.y}px,0) rotateX(${this.cam.rx}deg) rotateY(${this.cam.ry}deg)`;
      
      document.getElementById('coord-display').innerText = `Z:${this.cam.z.toFixed(2)}`;
      
      // Auto-spin logic: slowly rotate universe if not interacting
      if(Math.abs(this.cam.ry - this.tgt.ry) < 0.01) {
          this.tgt.ry += 0.005;
      }

      requestAnimationFrame(loop);
    };
    loop();
  }
};

// ============================================================================
// SEARCH & UI
// ============================================================================
function openSearch() {
  document.getElementById('search-overlay').classList.add('active');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
  runSearch('');
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('active');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}
function runSearch(q) {
  const c = document.getElementById('search-results');
  const query = q.toLowerCase();
  
  // Filter the loaded allPages array
  const results = Engine.allPages.filter(p => p.title.toLowerCase().includes(query)).slice(0, 15);
  
  if(results.length === 0) {
    c.innerHTML = `<div style="text-align:center;padding:20px;color:#475569;">No magical pages found 🍄</div>`;
    return;
  }
  
  c.innerHTML = results.map((item, i) => `
    <div class="s-card" style="animation-delay:${i*30}ms" onclick="jumpToPage('${item.title}')">
      <div class="s-em">📄</div>
      <div class="s-body"><h3>${item.title}</h3></div>
    </div>`).join('');
}
function jumpToPage(title) {
  closeSearch();
  // Find dot with this title and trigger click
  const targetDot = Array.from(document.querySelectorAll('.dot')).find(el => el.querySelector('.title-label').innerText === title);
  if(targetDot) {
    targetDot.click();
  } else {
    // Fallback if dot not found
    Engine.updateStatus(`Jumping to ${title}`);
    const url = `https://kids.miraheze.org/wiki/${encodeURIComponent(title)}`;
    Engine.openDetail(title, url, null, '🚀');
  }
}

// IGNITION
window.onload = () => Engine.init();

</script>
