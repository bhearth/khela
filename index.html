<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020408">
<meta name="description" content="Khel.o - Spatial Knowledge Engine">
<title>Khel.o · Spatial Intelligence</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{--bg:#020408;--glass:rgba(10,15,25,0.75);--border:rgba(255,255,255,0.07);--accent:#38bdf8;--gold:#fbbf24;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#e2e8f0;font-family:'Inter',system-ui;overflow:hidden;touch-action:none;height:100vh;background-image:linear-gradient(rgba(56,189,248,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.025) 1px,transparent 1px);background-size:60px 60px}

/* API Screen */
#key-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#key-screen.hidden{display:none}
#key-screen h1{font-family:'Space Grotesk';font-size:28px;color:var(--accent);letter-spacing:6px}
#key-screen input{width:400px;padding:14px 20px;background:var(--glass);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:'JetBrains Mono';outline:none}
#key-screen button{padding:14px 40px;background:var(--accent);color:#000;border:none;border-radius:12px;font-weight:700;cursor:pointer}
.provider-select{display:flex;gap:10px}
.provider-btn{padding:8px 16px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:#94a3b8;cursor:pointer}
.provider-btn.active{border-color:var(--accent);color:var(--accent)}

/* 3D Viewport */
#viewport{position:fixed;inset:0;perspective:2500px}
#hub{position:absolute;top:50%;left:50%;transform-style:preserve-3d}
svg.links{position:absolute;top:-6000px;left:-6000px;width:12000px;height:12000px;pointer-events:none}
.link-line{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-dasharray:3000;stroke-dashoffset:3000;animation:draw 1.8s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}

/* Nodes */
.node{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.34,1.56,.64,1);transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0);animation:pop .8s forwards}
@keyframes pop{to{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(1)}}
.node-core{width:90px;height:90px;border-radius:50%;background:var(--glass);border:2px solid currentColor;backdrop-filter:blur(10px)}
.node-card{width:200px;padding:16px;border-radius:16px;background:linear-gradient(145deg,rgba(30,41,59,0.9),rgba(15,23,42,0.95));border:1px solid rgba(255,255,255,0.08);text-align:left}
.node:hover{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),calc(var(--z) + 40px)) scale(1.3)!important;z-index:500;box-shadow:0 0 40px currentColor}
.n-icon{font-size:1.8em}
.n-title{font-size:12px;font-weight:600;color:#fff;margin-top:6px}
.n-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-top:6px;color:#cbd5e1}

/* HUD */
#hud{position:fixed;top:20px;left:20px;z-index:1000;pointer-events:none}
.hud-label{font-size:9px;letter-spacing:3px;color:#475569;text-transform:uppercase}
.hud-val{font-family:'JetBrains Mono';font-size:11px;color:var(--green)}

/* Search Bar */
#search-bar{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;gap:10px;width:90%;max-width:700px}
#search-input{flex:1;padding:14px 24px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;color:#fff;font-family:'JetBrains Mono';outline:none}
#search-btn{padding:14px 28px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border:none;border-radius:16px;font-weight:700;cursor:pointer}

/* Install Button */
#install-btn{position:fixed;top:20px;right:20px;z-index:1000;padding:10px 20px;background:var(--gold);color:#000;border:none;border-radius:12px;font-weight:600;cursor:pointer;display:none}

/* Loading */
#warp{position:fixed;inset:0;z-index:5000;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#warp.active{display:flex}
.warp-ring{width:60px;height:60px;border:2px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- API Key Screen -->
<div id="key-screen">
    <h1>KHEL.O</h1>
    <div class="provider-select">
        <div class="provider-btn active" onclick="selectProvider('openrouter')">OpenRouter</div>
        <div class="provider-btn" onclick="selectProvider('together')">Together AI</div>
        <div class="provider-btn" onclick="selectProvider('groq')">Groq</div>
    </div>
    <input type="password" id="api-key" placeholder="Enter API key...">
    <button onclick="activateEngine()">INITIALIZE</button>
    <p style="font-size:11px;color:#475569">Get key from openrouter.ai/keys (Google login)</p>
</div>

<!-- Install PWA Button -->
<button id="install-btn" onclick="installPWA()">📥 Install Khel.o App</button>

<!-- Loading -->
<div id="warp"><div class="warp-ring"></div><div style="font-size:11px;letter-spacing:4px;color:var(--accent)">QUERYING</div></div>

<!-- Search -->
<div id="search-bar" style="display:none">
    <input type="text" id="search-input" placeholder="Search the universe...">
    <button id="search-btn" onclick="executeSearch()">WARP</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
    <div class="hud-label">Khel.o Engine</div>
    <div class="hud-val" id="h-nodes">0 Nodes</div>
</div>

<!-- 3D Viewport -->
<div id="viewport"><div id="hub"><svg class="links" id="svg-links"></svg></div></div>

<!-- Dis-play Widget (Embedded) -->
<script src="display.js" data-upi="krishna.bh.earth@upi"></script>

<script>
// ═══════════════════════════════════════════════════════
//  KHLE.O SPATIAL ENGINE + AI PROVIDER ARCHITECTURE
// ═══════════════════════════════════════════════════════

let API_KEY='',API_URL='',MODEL='',selectedProvider='openrouter';
const PROVIDERS={
    openrouter:{url:'https://openrouter.ai/api/v1/chat/completions',model:'qwen/qwen-2.5-72b-instruct'},
    together:{url:'https://api.together.xyz/v1/chat/completions',model:'Qwen/Qwen2.5-72B-Instruct-Turbo'},
    groq:{url:'https://api.groq.com/openai/v1/chat/completions',model:'qwen-2.5-72b'}
};

function selectProvider(p){
    selectedProvider=p;
    document.querySelectorAll('.provider-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
}

const cam={x:0,y:0,z:0.8,rx:0,ry:0},tgt={x:0,y:0,z:0.8,rx:0,ry:0};
let vel={x:0,y:0},dragging=false,lastP={x:0,y:0},nodes=[],pathHistory=['ROOT'];
const FRICTION=0.92,LERP=0.1,SVG_C=6000;

function lerp(a,b,t){return a+(b-a)*t}

function activateEngine(){
    const k=document.getElementById('api-key').value.trim();
    if(!k){alert('Enter API key');return}
    API_KEY=k;API_URL=PROVIDERS[selectedProvider].url;MODEL=PROVIDERS[selectedProvider].model;
    document.getElementById('key-screen').classList.add('hidden');
    ['search-bar','hud'].forEach(id=>document.getElementById(id).style.display='');
    setupGestures();renderLoop();spawnSeed();
}

async function queryQwen(query){
    const sysPrompt=`You are Khel.o Spatial Engine. Generate JSON array of 8-15 knowledge nodes for: "${query}". Each node:{type:"core|card|media|book|hex",icon:"emoji",title:"name",subtitle:"category",desc:"2-3 sentences",color:"hex",children:["subtopic1","subtopic2"]}. Output ONLY valid JSON array.`;
    
    const res=await fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
        body:JSON.stringify({model:MODEL,messages:[{role:'system',content:sysPrompt},{role:'user',content:`Generate nodes for: ${query}`}],temperature:0.8,max_tokens:4000})
    });
    if(!res.ok)throw new Error(await res.text());
    const data=await res.json();
    let text=data.choices[0].message.content.trim();
    if(text.startsWith('```'))text=text.replace(/^```json?\n?/,'').replace(/\n?```$/,'');
    return JSON.parse(text);
}

async function executeSearch(q){
    if(!q)q=document.getElementById('search-input').value.trim();
    if(!q)return;
    document.getElementById('search-btn').disabled=true;
    document.getElementById('warp').classList.add('active');
    
    try{
        const result=await queryQwen(q);
        nodes.forEach(n=>n.el.classList.add('faded'));
        await new Promise(r=>setTimeout(r,500));
        clearHub();
        pathHistory.push(q.toUpperCase());
        spawnGalaxy(result,q);
        document.getElementById('h-nodes').innerText=`${result.length} Nodes`;
    }catch(err){alert('Error: '+err.message)}
    
    document.getElementById('warp').classList.remove('active');
    document.getElementById('search-btn').disabled=false;
    tgt.z=0.8;tgt.x=0;tgt.y=0;
}

function spawnGalaxy(data,query){
    const hub=document.getElementById('hub'),svg=document.getElementById('svg-links');
    nodes=[];
    
    // Central seed
    const seed=document.createElement('div');
    seed.className='node node-core';
    seed.style.cssText=`--x:0px;--y:0px;--z:0px;color:var(--accent);width:100px;height:100px;`;
    seed.innerHTML=`<div class="n-icon">🔭</div><div class="n-label">${query}</div>`;
    hub.appendChild(seed);nodes.push({el:seed,data:{title:query}});
    
    data.forEach((d,i)=>{
        const angle=i*2.39996,r=250+(i*55);
        const x=r*Math.cos(angle),y=r*Math.sin(angle),z=Math.sin(i*0.7)*120;
        
        // SVG Link
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        const mx=x/2-y*0.12,my=y/2+x*0.12;
        path.setAttribute('d',`M ${SVG_C} ${SVG_C} Q ${mx+SVG_C} ${my+SVG_C} ${x+SVG_C} ${y+SVG_C}`);
        path.setAttribute('class','link-line');
        path.style.stroke=d.color;path.style.strokeOpacity=0.35;
        svg.appendChild(path);
        
        // Node
        const el=document.createElement('div');
        el.className=`node node-${d.type||'core'}`;
        el.style.cssText=`--x:${x}px;--y:${y}px;--z:${z}px;color:${d.color};animation-delay:${i*0.08}s`;
        el.innerHTML=d.type==='card'?`<div class="n-icon">${d.icon}</div><div class="n-title">${d.title}</div>`:`<div class="n-icon">${d.icon}</div><div class="n-label">${d.title}</div>`;
        
        el.onclick=(e)=>{e.stopPropagation();tgt.x=-x;tgt.y=-y;tgt.z=1.8;};
        el.ondblclick=(e)=>{e.stopPropagation();if(d.children?.length){const c=d.children[Math.floor(Math.random()*d.children.length)];document.getElementById('search-input').value=c;executeSearch(c);}};
        
        hub.appendChild(el);nodes.push({el,data:d,x,y,z});
    });
}

function spawnSeed(){
    const el=document.createElement('div');
    el.className='node node-core';
    el.style.cssText=`--x:0px;--y:0px;--z:0px;color:var(--gold);width:110px;height:110px`;
    el.innerHTML=`<div class="n-icon" style="font-size:2.2em">☀️</div><div class="n-label">SEARCH</div>`;
    el.onclick=()=>document.getElementById('search-input').focus();
    document.getElementById('hub').appendChild(el);nodes.push({el,data:{title:'ROOT'}});
}

function clearHub(){
    Array.from(document.getElementById('hub').children).forEach(c=>{if(c.id!=='svg-links')c.remove()});
    document.getElementById('svg-links').innerHTML='';nodes=[];
}

function setupGestures(){
    const vp=document.getElementById('viewport'),mc=new Hammer.Manager(vp);
    mc.add([new Hammer.Pan({direction:Hammer.DIRECTION_ALL,threshold:0}),new Hammer.Pinch({enable:true}),new Hammer.Tap({event:'doubletap',taps:2})]);
    mc.get('pinch').recognizeWith(mc.get('pan'));
    let iZ=1;
    
    mc.on('pinchstart',()=>{iZ=tgt.z});
    mc.on('pinch',e=>{tgt.z=Math.max(0.05,Math.min(6,iZ*e.scale))});
    mc.on('panstart',e=>{dragging=true;lastP={x:e.center.x,y:e.center.y}});
    mc.on('panmove',e=>{if(!dragging)return;const dx=e.center.x-lastP.x,dy=e.center.y-lastP.y;if(e.pointers.length>=2){tgt.ry+=dx*0.3;tgt.rx-=dy*0.3}else{tgt.x+=dx/cam.z;tgt.y+=dy/cam.z}lastP={x:e.center.x,y:e.center.y}});
    mc.on('panend',()=>{dragging=false});
    mc.on('doubletap',()=>{tgt.x=0;tgt.y=0;tgt.z=0.8});
    window.addEventListener('wheel',e=>{tgt.z=Math.max(0.05,Math.min(6,tgt.z-e.deltaY*0.0012))},{passive:true});
}

function renderLoop(){
    if(!dragging){tgt.x+=vel.x;tgt.y+=vel.y;vel.x*=FRICTION;vel.y*=FRICTION}
    cam.x=lerp(cam.x,tgt.x,LERP);cam.y=lerp(cam.y,tgt.y,LERP);cam.z=lerp(cam.z,tgt.z,LERP);
    cam.rx=lerp(cam.rx,tgt.rx,LERP);cam.ry=lerp(cam.ry,tgt.ry,LERP);
    document.getElementById('hub').style.transform=`translate(-50%,-50%) scale(${cam.z}) translate3d(${cam.x}px,${cam.y}px,0) rotateX(${cam.rx}deg) rotateY(${cam.ry}deg)`;
    if(!dragging&&nodes.length>1)tgt.ry+=0.01;
    requestAnimationFrame(renderLoop);
}

// PWA Installation
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-btn').style.display='block'});

async function installPWA(){
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    if(outcome==='accepted')document.getElementById('install-btn').style.display='none';
    deferredPrompt=null;
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')executeSearch()});
</script>
</body>
</html>
