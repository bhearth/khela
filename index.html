<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khel.o · Earth 00 OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --gold: #fbbf24;
            --teal: #14b8a6;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        /* The Central Sun (Hidden until Big Bang) */
        #sun {
            position: absolute;
            width: 80px; height: 80px;
            background: radial-gradient(circle, #fff 0%, var(--gold) 40%, #d97706 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(251, 191, 36, 0.3);
            opacity: 0;
            transform: scale(0);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }
        #sun.active { opacity: 1; transform: scale(1); }

        /* The Orbiting Domain Nodes */
        .domain-node {
            position: absolute;
            width: 90px; height: 90px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .domain-node.active { opacity: 1; transform: scale(1); }
        
        .domain-node:hover {
            border-color: var(--gold);
            background: rgba(251, 191, 36, 0.1);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
            transform: scale(1.15) !important;
        }

        .domain-icon { font-size: 28px; margin-bottom: 4px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .domain-name { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px; 
            font-weight: 700;
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: var(--text); 
            text-align: center;
            line-height: 1.2;
        }
        .domain-code {
            font-size: 8px;
            color: var(--teal);
            margin-top: 2px;
            font-family: monospace;
        }

        /* Orbital Rings (Visual flair) */
        .orbit-ring {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .orbit-ring.active { opacity: 1; }

        /* Status Text */
        #status-text {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-family: 'Space Grotesk', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="status-text">Awaiting the Seed...</div>
    
    <!-- The Central Sun -->
    <div id="sun">☀️</div>

    <!-- Orbital Rings (Generated by JS) -->
    <div id="rings-container"></div>

    <!-- The Universe Container (Domains will be injected here) -->
    <div id="universe"></div>

    <!-- Load the Big Bang Trigger & JSON Bridge -->
    <!-- Note: When testing locally, ensure display.js is in the same folder, or point to your GitHub URL -->
    <script src="display.js"></script>

    <script>
        // ==========================================
        // BABY STEP 2: THE BIG BANG RENDERER
        // ==========================================

        const sun = document.getElementById('sun');
        const universe = document.getElementById('universe');
        const ringsContainer = document.getElementById('rings-container');
        const statusText = document.getElementById('status-text');

        // 1. Listen for the Big Bang Trigger (Fired when user clicks the Golden Dot)
        window.addEventListener('khela:bigbang:init', () => {
            statusText.innerText = 'Initiating Big Bang... Fetching Mesh...';
            statusText.style.color = 'var(--teal)';
        });

        // 2. Listen for the Mesh Ready Event (Fired when 1.json & symbol1.json are loaded)
        window.addEventListener('khela:mesh:ready', () => {
            statusText.innerText = 'Mesh Synchronized. The 9 Roots Awaken.';
            statusText.style.color = 'var(--gold)';
            
            // Trigger the visual explosion
            igniteSun();
            
            // Render the domains from the fetched JSON
            const domains = window.KhelaMesh.rootDomains;
            const symbols = window.KhelaMesh.symbols;
            
            if (domains && domains.length > 0) {
                renderOrbitingDomains(domains, symbols);
            } else {
                statusText.innerText = 'Error: Root Domains not found in 1.json';
            }
        });

        function igniteSun() {
            setTimeout(() => {
                sun.classList.add('active');
            }, 300);
        }

        function renderOrbitingDomains(domains, symbols) {
            const count = domains.length;
            
            // Calculate responsive radius based on screen size
            const minDim = Math.min(window.innerWidth, window.innerHeight);
            const radius = minDim * 0.35; // 35% of the smallest screen dimension

            // Create the visual orbital ring
            const ring = document.createElement('div');
            ring.className = 'orbit-ring';
            ring.style.width = `${radius * 2}px`;
            ring.style.height = `${radius * 2}px`;
            ringsContainer.appendChild(ring);
            setTimeout(() => ring.classList.add('active'), 500);

            // Map 1.json domains to visual nodes
            domains.forEach((domain, index) => {
                const node = document.createElement('div');
                node.className = 'domain-node';
                
                // Try to find a matching icon from symbol1.json based on the domain name, 
                // fallback to a planetary emoji if not found.
                let icon = '🪐'; 
                const nameLower = domain.name.toLowerCase();
                if (nameLower.includes('individual')) icon = '🧠';
                else if (nameLower.includes('samajh') || nameLower.includes('community')) icon = '🤝';
                else if (nameLower.includes('econology') || nameLower.includes('earth')) icon = '🌍';
                else if (nameLower.includes('discovery')) icon = '🔭';
                else if (nameLower.includes('innovation')) icon = '💡';
                else if (nameLower.includes('sahyog')) icon = '🌱';
                else if (nameLower.includes('mukti')) icon = '🕊️';

                node.innerHTML = `
                    <span class="domain-icon">${icon}</span>
                    <span class="domain-name">${domain.name}</span>
                    <span class="domain-code">${domain.code}</span>
                `;

                // Mathematical positioning (Perfect Circle)
                // Offset by -Math.PI/2 so the first node starts at the top (12 o'clock)
                const angle = (index / count) * Math.PI * 2 - (Math.PI / 2); 
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                node.style.left = `calc(50% + ${x}px - 45px)`;
                node.style.top = `calc(50% + ${y}px - 45px)`;
                
                // Stagger the pop-in animation
                node.style.transitionDelay = `${0.8 + (index * 0.1)}s`;

                // Add interaction for the NEXT baby step (Drill Down)
                node.addEventListener('click', () => {
                    handleDomainSelection(domain);
                });

                universe.appendChild(node);
                
                // Trigger animation
                setTimeout(() => node.classList.add('active'), 100);
            });
        }

        // 3. The Bridge to the Next Layer (Integral.js / 5W1H)
        function handleDomainSelection(domain) {
            console.log(`[Earth 00 OS] Selected Domain: ${domain.name} (${domain.code})`);
            statusText.innerText = `Focusing on ${domain.name}...`;
            
            // Haptic feedback
            if (navigator.vibrate) navigator.vibrate(30);

            // Fire event for the next engine (e.g., Integral.js Mandala)
            window.dispatchEvent(new CustomEvent('khela:domain:focus', { 
                detail: domain 
            }));
            
            // Visual feedback on the node
            document.querySelectorAll('.domain-node').forEach(n => n.style.opacity = '0.3');
            event.currentTarget.style.opacity = '1';
            event.currentTarget.style.transform = 'scale(1.3)';
        }

        // Handle window resize to keep orbit perfect
        window.addEventListener('resize', () => {
            // In a production app, we would recalculate X/Y here. 
            // For Baby Step 2, a simple reload or CSS recalc handles it.
        });
    </script>
</body>
</html>
