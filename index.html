<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Khel.o · Wiki Explorer OS</title>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:#010204;color:#e2e8f0;
  font-family:'Inter',system-ui,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  height:100dvh;width:100dvw;
  background-image:radial-gradient(circle at center,#0a1128 0%,#010204 100%);
}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:clamp(10px,3vw,18px);
  pointer-events:none;z-index:50;
  background:linear-gradient(180deg,rgba(1,2,4,0.94) 60%,transparent);
}
.brand{font-family:'Space Grotesk', sans-serif; font-size:1.2rem; font-weight:700; color:#38bdf8; text-shadow:0 0 10px rgba(56,189,248,0.6);}
.telemetry{font-size:10px; color:#94a3b8; text-align:right; letter-spacing:1px;}

/* ── Toolbar ── */
#toolbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;align-items:center;
  padding:15px; background:linear-gradient(0deg,rgba(1,2,4,0.97) 75%,transparent);
  z-index:50;gap:10px;pointer-events:auto;
}
.btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:10px 20px;cursor:pointer;color:#fff;
  font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:12px;
  backdrop-filter:blur(10px); transition:0.2s; display:flex; align-items:center; gap:6px;
}
.btn:active{transform:scale(0.92);background:rgba(255,255,255,0.15);}

/* ── 3D Viewport ── */
#viewport{position:absolute;top:50dvh;left:50dvw;z-index:10;}
#hub{position:absolute;top:0;left:0;transform-style:preserve-3d;will-change:transform;}
svg{position:absolute;top:-5000px;left:-5000px;width:10000px;height:10000px;pointer-events:none;}
.stellar-path{fill:none;stroke-width:2;stroke-linecap:round;filter:drop-shadow(0 0 5px currentColor);transition:d 1s cubic-bezier(0.34,1.56,0.64,1);}

/* ── Universe Nodes ── */
.jnode{
  position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;text-align:center;
  background:rgba(10,15,25,0.85);border:2px solid;backdrop-filter:blur(10px);
  transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0);
  animation:supernova 0.75s cubic-bezier(.34,1.56,.64,1) forwards;
  will-change:transform;pointer-events:auto;
  transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
}
.jnode:hover, .jnode:active {
  background:currentColor!important;color:#000!important;
  box-shadow:0 0 30px currentColor,inset 0 0 15px #fff;z-index:500;
  transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),calc(var(--z) + 40px)) scale(1.2)!important;
}
.jnode .ji{font-size:clamp(20px,5vw,32px);filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));transition:0.3s;line-height:1;}
.jnode:hover .ji{transform:scale(1.2);}
.jnode .jl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-top:6px;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
@keyframes supernova{to{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(1);}}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:rgba(1,2,4,0.97);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;backdrop-filter:blur(5px);}
.spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);border-top-color:#38bdf8;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:#38bdf8;font-family:'Space Grotesk', sans-serif;letter-spacing:2px;text-transform:uppercase;font-size:14px;font-weight:bold;}

/* ── Wiki Details Sheet (Mobile First) ── */
#modal{
  position:fixed;bottom:-100%;left:0;right:0;
  background:rgba(8,12,20,0.98);border-top:2px solid var(--col, #38bdf8);
  border-radius:30px 30px 0 0;padding:25px;transition:0.5s cubic-bezier(.34,1.56,.64,1);
  z-index:250;backdrop-filter:blur(25px);box-shadow:0 -10px 40px rgba(0,0,0,0.8);
  max-height:85vh;overflow-y:auto;pointer-events:auto; display:flex; flex-direction:column;
}
#modal.open{bottom:0;}
.m-handle{width:40px;height:5px;background:rgba(255,255,255,.2);border-radius:5px;margin:0 auto 20px;cursor:pointer;}
.m-header { display:flex; align-items:center; gap:15px; margin-bottom: 20px;}
.m-icon { font-size:40px; background:rgba(255,255,255,0.05); padding:10px; border-radius:16px; border:1px solid rgba(255,255,255,0.1);}
.m-title { font-family:'Space Grotesk'; font-size:24px; font-weight:800; color:#fff; line-height:1.1;}
.m-summary { font-size:14px; color:#cbd5e1; line-height:1.6; margin-bottom:20px; max-height:150px; overflow-y:auto; padding-right:10px;}
.m-summary::-webkit-scrollbar { width:4px; }
.m-summary::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }

.stats-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:20px;}
.stat-box { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:12px; text-align:center;}
.stat-val { font-size:20px; font-weight:bold; font-family:'Space Grotesk'; color:var(--col, #38bdf8);}
.stat-lbl { font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-top:2px; font-weight:600;}

.tags-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:25px;}
.tag { padding:4px 10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; font-size:10px; color:#94a3b8; font-weight:600;}

.btn-launch { background:var(--col, #38bdf8); color:#000; font-family:'Space Grotesk'; font-size:16px; font-weight:800; text-transform:uppercase; letter-spacing:1px; padding:16px; border-radius:30px; text-align:center; text-decoration:none; display:block; box-shadow:0 10px 20px rgba(0,0,0,0.3); transition:0.2s;}
.btn-launch:active { transform:scale(0.95); }

#export-canvas{display:none;}
</style>
</head>
<body>

<div id="hud">
  <div class="brand">Khel.o Matrix</div>
  <div class="telemetry">
      <span id="zoom">Z: 1.00</span><br>
      <span id="wiki-host" style="color:#64748b;">Awaiting Data</span>
  </div>
</div>

<div id="viewport"><div id="hub"><svg id="lines"></svg></div></div>
<canvas id="export-canvas" width="1920" height="1080"></canvas>

<div id="toolbar">
  <button class="btn" onclick="KhelOS.fire('changeLayout','flower')">🌸 Flower</button>
  <button class="btn" onclick="KhelOS.fire('changeLayout','radial')">🎯 Orbit</button>
  <button class="btn" onclick="KhelOS.fire('exportGraph')">🎨 Export</button>
</div>

<!-- Detailed Mobile-First Wiki Modal -->
<div id="modal">
  <div class="m-handle" onclick="document.getElementById('modal').classList.remove('open')"></div>
  
  <div class="m-header">
      <div class="m-icon" id="m-icon">📄</div>
      <div class="m-title" id="m-title">Loading...</div>
  </div>
  
  <div class="m-summary" id="m-summary">
      Extracting knowledge from the matrix...
  </div>
  
  <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="m-words">0</div><div class="stat-lbl">Words</div></div>
      <div class="stat-box"><div class="stat-val" id="m-links">0</div><div class="stat-lbl">Links</div></div>
      <div class="stat-box"><div class="stat-val" id="m-cats">0</div><div class="stat-lbl">Categories</div></div>
  </div>

  <div class="tags-row" id="m-tags"></div>

  <a href="#" id="m-link" target="_blank" class="btn-launch">Read Full Article</a>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Connecting to Wiki...</div>
</div>

<script>
/**
 * STREAMING_CHUNK: Core Engine Initialization
 */
const ICONS = ['🌟','🚀','🎈','🎨','🦁','🍎','🌈','🧩','🦋','🧸','🦖','🛸','🌞','🌻','🍄','🐠'];

const KhelOS = {
  hub: document.getElementById('hub'), svg: document.getElementById('lines'),
  nodes: [], edges: [], plugins: [],
  cam: {x:0, y:0, z:0.5, rx:0, ry:0}, tgt: {x:0, y:0, z:0.5, rx:0, ry:0},
  isMobile: window.innerWidth < 768,
  
  use(p) { this.plugins.push(p); if(p.init) p.init(this); },
  fire(h, d) { let r = d; for(let p of this.plugins) if(p[h]) r = p[h](r, this) || r; return r; },
  
  boot() { 
      this.setupGestures(); 
      this.loop(); 
      this.fire('onBoot'); 
  },
  
  addNode(data, x, y, z) {
    const el = document.createElement('div'); el.className = 'jnode';
    const sz = data.isRoot ? (this.isMobile ? 80 : 100) : (this.isMobile ? 60 : 70);
    el.style.cssText = `--x:${x}px; --y:${y}px; --z:${z}px; width:${sz}px; height:${sz}px; color:${data.color}; border-color:${data.color};`;
    el.innerHTML = `<div class="ji">${data.icon}</div><div class="jl" style="color:${data.color}">${data.title.substring(0,14)}</div>`;
    
    const n = { el, data, tx:x, ty:y, tz:z };
    el.onclick = (e) => { 
        e.stopPropagation(); 
        if(navigator.vibrate) navigator.vibrate(15);
        this.tgt.x = -n.tx; this.tgt.y = -n.ty; this.tgt.z = this.isMobile ? 1.0 : 1.4; 
        this.fire('onClick', n); 
    };
    this.hub.appendChild(el); this.nodes.push(n); return n;
  },
  
  addEdge(s, t, c) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("class", "stellar-path"); path.style.stroke = c; path.style.strokeOpacity = 0.5;
    this.svg.appendChild(path); this.edges.push({s, t, el: path});
  },

  setupGestures() {
    const mc = new Hammer.Manager(document.getElementById('viewport'));
    mc.add(new Hammer.Pan({ threshold: 0 })); mc.add(new Hammer.Pinch({ enable: true })).recognizeWith(mc.get('pan'));
    mc.add(new Hammer.Tap({ event: 'doubletap', taps: 2 }));
    let iz = 1, pan = false, lx = 0, ly = 0;
    
    mc.on('doubletap', () => { this.tgt.x=0; this.tgt.y=0; this.tgt.z=this.isMobile ? 0.3 : 0.6; this.tgt.rx=0; this.tgt.ry=0; });
    mc.on('pinchstart', () => iz = this.tgt.z);
    mc.on('pinch', e => this.tgt.z = Math.max(0.05, Math.min(4, iz * e.scale)));
    mc.on('panstart', e => { pan = true; lx = e.center.x; ly = e.center.y; });
    mc.on('panmove', e => {
      if(!pan) return; let dx = e.center.x - lx, dy = e.center.y - ly;
      if (e.pointers.length >= 2 || e.srcEvent.shiftKey) { this.tgt.ry += dx*0.4; this.tgt.rx -= dy*0.4; } 
      else { this.tgt.x += dx/this.cam.z; this.tgt.y += dy/this.cam.z; }
      lx = e.center.x; ly = e.center.y;
    });
    mc.on('panend', () => pan = false);
    window.onwheel = e => this.tgt.z = Math.max(0.05, Math.min(4, this.tgt.z - e.deltaY * 0.0015));
  },

  loop() {
    const lerp = (s,e,f) => s+(e-s)*f; const O = 5000;
    const tick = () => {
      this.cam.x=lerp(this.cam.x,this.tgt.x,0.08); this.cam.y=lerp(this.cam.y,this.tgt.y,0.08); this.cam.z=lerp(this.cam.z,this.tgt.z,0.08);
      this.cam.rx=lerp(this.cam.rx,this.tgt.rx,0.08); this.cam.ry=lerp(this.cam.ry,this.tgt.ry,0.08);
      
      this.hub.style.transform = `translate(-50%,-50%) scale(${this.cam.z}) translate3d(${this.cam.x}px,${this.cam.y}px,0) rotateX(${this.cam.rx}deg) rotateY(${this.cam.ry}deg)`;
      document.getElementById('zoom').innerText = `Z: ${this.cam.z.toFixed(2)}`;
      
      // Auto gentle rotation
      if(Math.abs(this.cam.ry - this.tgt.ry) < 0.01 && this.nodes.length > 1) this.tgt.ry += 0.002;

      this.nodes.forEach(n => {
        n.x=lerp(n.x||0,n.tx,0.05); n.y=lerp(n.y||0,n.ty,0.05); n.z=lerp(n.z||0,n.tz,0.05);
        n.el.style.setProperty('--x', `${n.x}px`); n.el.style.setProperty('--y', `${n.y}px`); n.el.style.setProperty('--z', `${n.z}px`);
      });

      this.edges.forEach(e => {
        if(e.s.x!==undefined && e.t.x!==undefined) {
          const mx = (e.s.x+e.t.x)/2 - (e.t.y-e.s.y)*0.2 + O, my = (e.s.y+e.t.y)/2 + (e.t.x-e.s.x)*0.2 + O;
          e.el.setAttribute("d", `M${e.s.x+O} ${e.s.y+O} Q${mx} ${my} ${e.t.x+O} ${e.t.y+O}`);
        }
      });
      requestAnimationFrame(tick);
    };
    tick();
  }
};

/**
 * STREAMING_CHUNK: MediaWiki Integration Plugin
 * Uses the native API extracts to get perfect summaries without regex scraping.
 */
const ExtWikiLogic = {
  host: "https://kids.miraheze.org",
  
  async onBoot(d, os) {
    const p = new URLSearchParams(window.location.search);
    const title = p.get('wiki') || "Earth";
    if (p.get('host')) this.host = p.get('host');
    
    document.getElementById('wiki-host').innerText = this.host.replace('https://', '');

    try {
        // Fetch standard links for the graph layout
        const res = await fetch(`${this.host}/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=links&format=json&origin=*`);
        const data = await res.json();
        if(data.error) throw new Error();

        const links = (data.parse.links||[]).filter(l=>l.ns===0).map(l=>l['*']).slice(0,24); // Up to 24 petals
        
        // Spawn Graph
        const root = os.addNode({ title: data.parse.title, icon:'🌌', color:'#38bdf8', isRoot:true }, 0,0,0);
        links.forEach((l, i) => {
            const hue = (i * 15) % 360;
            const col = `hsl(${hue}, 80%, 65%)`;
            const n = os.addNode({ title: l, icon: ICONS[i%ICONS.length], color: col }, 0,0,0);
            os.addEdge(root, n, col);
        });
        
        os.fire('changeLayout', 'flower');
        os.tgt.z = os.isMobile ? 0.25 : 0.6;
        
        document.getElementById('loading').style.opacity = 0;
        setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

    } catch(e) {
        document.getElementById('loading-msg').innerText = "Failed to load Wiki data.";
    }
  },

  async onClick(n, os) {
    const modal = document.getElementById('modal');
    modal.style.setProperty('--col', n.data.color);
    
    // UI Loading State
    document.getElementById('m-title').innerText = n.data.title;
    document.getElementById('m-icon').innerText = "⏳";
    document.getElementById('m-icon').style.animation = "spin 2s linear infinite";
    document.getElementById('m-summary').innerText = "Extracting knowledge...";
    document.getElementById('m-words').innerText = "-";
    document.getElementById('m-links').innerText = "-";
    document.getElementById('m-cats').innerText = "-";
    document.getElementById('m-tags').innerHTML = "";
    
    modal.classList.add('open');

    try {
        // The Magic API Call: "exintro=1&explaintext=1" gets just the clean summary text!
        const extractApi = `${this.host}/w/api.php?action=query&prop=extracts|links|categories&exintro=1&explaintext=1&titles=${encodeURIComponent(n.data.title)}&format=json&origin=*`;
        
        const res = await fetch(extractApi);
        const data = await res.json();
        
        const pages = data.query.pages;
        const pageId = Object.keys(pages)[0];
        const pageData = pages[pageId];

        if(pageId == "-1") throw new Error("Page not found");

        // Populate Modal with Clean Data
        document.getElementById('m-icon').style.animation = "none";
        document.getElementById('m-icon').innerText = n.data.icon;
        
        const summary = pageData.extract || "No summary available for this topic. Click below to explore the full page.";
        document.getElementById('m-summary').innerText = summary;

        // Stats
        const wordCount = summary.split(/\s+/).filter(w => w.length > 2).length;
        const linkCount = pageData.links ? pageData.links.length : 0;
        const catCount = pageData.categories ? pageData.categories.length : 0;

        document.getElementById('m-words').innerText = wordCount > 0 ? `~${wordCount * 10}` : "0"; // Estimate total based on intro
        document.getElementById('m-links').innerText = linkCount;
        document.getElementById('m-cats').innerText = catCount;

        // Categories as Tags
        if (pageData.categories) {
            document.getElementById('m-tags').innerHTML = pageData.categories
                .slice(0, 5)
                .map(c => `<span class="tag">${c.title.replace('Category:', '')}</span>`)
                .join('');
        }

        // Link
        document.getElementById('m-link').href = `${this.host}/wiki/${encodeURIComponent(n.data.title.replace(/ /g, '_'))}`;
        document.getElementById('m-link').style.backgroundColor = n.data.color;

    } catch (e) {
        document.getElementById('m-icon').style.animation = "none";
        document.getElementById('m-icon').innerText = n.data.icon;
        document.getElementById('m-summary').innerText = "Detailed summary unavailable via API. Open the full page to explore.";
        document.getElementById('m-link').href = `${this.host}/wiki/${encodeURIComponent(n.data.title.replace(/ /g, '_'))}`;
        document.getElementById('m-link').style.backgroundColor = n.data.color;
    }
  },

  changeLayout(type, os) {
    const petals = os.nodes.filter(n => !n.data.isRoot);
    const root = os.nodes.find(n => n.data.isRoot);
    if(root) { root.tx = 0; root.ty = 0; root.tz = 0; }

    petals.forEach((n, i) => {
      if(type==='flower') {
        const a = i * 137.508 * (Math.PI/180);
        const r = (os.isMobile ? 100 : 150) + Math.sqrt(i)*30;
        n.tx = Math.cos(a)*r; n.ty = Math.sin(a)*r; n.tz = Math.sin(i*0.5)*40;
      } else if (type === 'radial') {
        const a = (i / petals.length) * Math.PI * 2;
        const r = os.isMobile ? 200 : 300;
        n.tx = Math.cos(a)*r; n.ty = Math.sin(a)*r; n.tz = (i%2===0 ? 30 : -30);
      } else { // tree
        const cols = Math.ceil(Math.sqrt(petals.length));
        const c = i % cols, r = Math.floor(i / cols);
        const sp = os.isMobile ? 100 : 120;
        n.tx = (c - cols/2 + 0.5) * sp; n.ty = (r + 1) * sp; n.tz = 0;
        if(root) root.ty = -sp;
      }
    });
  },

  exportGraph(d, os) {
    const cvs = document.getElementById('export-canvas'), ctx = cvs.getContext('2d');
    ctx.fillStyle = '#010204'; ctx.fillRect(0,0,1920,1080);
    
    // Background gradient
    const grd = ctx.createRadialGradient(960, 540, 0, 960, 540, 800);
    grd.addColorStop(0, '#0a1128'); grd.addColorStop(1, '#010204');
    ctx.fillStyle = grd; ctx.fillRect(0,0,1920,1080);

    const scale = os.isMobile ? 2.5 : 1.5;

    ctx.lineWidth = 3;
    os.edges.forEach(e => {
      ctx.beginPath(); ctx.moveTo(960+e.s.tx*scale, 540+e.s.ty*scale); 
      const nx = 960+e.t.tx*scale, ny = 540+e.t.ty*scale;
      ctx.quadraticCurveTo((960+e.s.tx*scale+nx)/2 - (ny-(540+e.s.ty*scale))*0.2, ((540+e.s.ty*scale)+ny)/2 + (nx-(960+e.s.tx*scale))*0.2, nx, ny);
      ctx.strokeStyle=e.t.data.color; ctx.globalAlpha = 0.5; ctx.stroke();
    });

    ctx.globalAlpha = 1.0;
    os.nodes.forEach(n => {
      const r = n.data.isRoot ? 70 : 45;
      const x = 960+n.tx*scale, y = 540+n.ty*scale;
      
      ctx.shadowColor = n.data.color; ctx.shadowBlur = 30;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fillStyle = '#0f172a'; ctx.fill();
      ctx.lineWidth = 4; ctx.strokeStyle = n.data.color; ctx.stroke();
      
      ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = `${r*0.8}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.data.icon, x, y);
      
      ctx.fillStyle = n.data.color; ctx.font = `bold ${r*0.35}px 'Space Grotesk', sans-serif`;
      ctx.fillText(n.data.title.toUpperCase(), x, y+r+25);
    });

    const root = os.nodes.find(n => n.data.isRoot);
    ctx.fillStyle = '#94a3b8'; ctx.font = '24px Inter'; ctx.textAlign = 'left';
    ctx.fillText(`Khel.o Infinite Knowledge Map · ${root ? root.data.title : 'Export'}`, 40, 1040);

    const a = document.createElement('a'); a.download='wondergraph.png'; a.href=cvs.toDataURL(); a.click();
  }
};

KhelOS.use(ExtWikiLogic);
KhelOS.boot();
</script>
</body>
</html>
