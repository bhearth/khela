<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Khel.o | 1.json -> 3D Cosmos</title>
<style>
    body { margin: 0; overflow: hidden; background: #030406; font-family: system-ui, sans-serif; color: #fff; }
    #canvas-container { position: absolute; inset: 0; }
    #labels-container { position: absolute; inset: 0; pointer-events: none; }
    
    /* HUD */
    #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    #hud h1 { font-size: 1.2rem; letter-spacing: 2px; color: #fbbf24; margin: 0; }
    #hud p { font-size: 0.7rem; color: #94a3b8; margin: 4px 0 0; letter-spacing: 1px; }
    
    /* 3D Labels */
    .node-label {
        position: absolute; pointer-events: auto; cursor: pointer;
        transform: translate(-50%, -50%); text-align: center;
        transition: transform 0.2s, opacity 0.3s;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    .node-label:hover { transform: translate(-50%, -50%) scale(1.2); }
    .node-label .icon { font-size: 24px; display: block; }
    .node-label .name { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #e2e8f0; font-weight: 600; }
    .node-label .code { font-size: 8px; color: #fbbf24; font-family: monospace; }
    
    /* Loading State */
    #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #030406; z-index: 100; transition: opacity 1s; }
    #loader.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="labels-container"></div>

<div id="hud">
    <h1>🌌 KHEL.O / APHELION</h1>
    <p>Fetching 1.json... Mapping 10D Vectors to 3D Physics...</p>
</div>

<div id="loader">
    <p style="color: #fbbf24; letter-spacing: 4px;">AWAKENING THE MESH...</p>
</div>

<!-- Three.js & OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/**
 * THE BRIDGE: 1.json -> Three.js Physics
 * Zero Hardcoded Data. Pure Mathematical Mapping.
 */
const FIB_SEQ = [1, 2, 3, 5, 8, 13, 21, 34];
const FIB_SCALE = 45;
const ICONS = ['🧠', '🤝', '🌍', '🏗️', '🔭', '💡', '🌱', '🕊️']; // Map to 0.1 -> 0.9

let scene, camera, renderer, controls;
let bodies = []; // Stores { mesh, label, data }
let raycaster, mouse;

// ==========================================
// 1. THE MATH ENGINE (Vector -> Visuals)
// ==========================================
function vectorToColor(v) {
    // v[3]=Prakriti(Nature/Green), v[6]=Shaurya(Courage/Red), v[7]=Viveka(Wisdom/Blue)
    const r = Math.floor(((v[6] + 1) / 2) * 255);
    const g = Math.floor(((v[3] + 1) / 2) * 255);
    const b = Math.floor(((v[7] + 1) / 2) * 255);
    return new THREE.Color(`rgb(${r},${g},${b})`);
}

function vectorToSize(v) {
    // v[9]=Seva(Service) determines mass/size
    return 1.5 + Math.abs(v[9]) * 2.5; 
}

function vectorToSpeed(v) {
    // v[8]=Mukti(Liberation) determines orbital velocity
    return 0.002 + Math.abs(v[8]) * 0.008;
}

// ==========================================
// 2. INITIALIZATION & FETCH
// ==========================================
async function init() {
    // Setup Three.js
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 10000);
    camera.position.set(0, 150, 250);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 50;
    controls.maxDistance = 800;
    
    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const sunLight = new THREE.PointLight(0xffaa33, 2, 1000);
    scene.add(sunLight);
    
    // Center Core (The Sun / 100 Day Launcher)
    const coreGeo = new THREE.SphereGeometry(8, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xffaa33 });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    // Raycaster for Clicks
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', onClick);
    window.addEventListener('resize', onResize);

    // FETCH 1.json
    try {
        const response = await fetch('1.json');
        const json = await response.json();
        generateCosmos(json.domains);
        document.getElementById('loader').classList.add('hidden');
        animate();
    } catch (e) {
        console.error("Failed to load 1.json. Ensure it's in the same directory.", e);
        document.getElementById('loader').innerHTML = '<p style="color:red;">Error loading 1.json</p>';
    }
}

// ==========================================
// 3. GENERATE THE 3D COSMOS
// ==========================================
function generateCosmos(domains) {
    const keys = Object.keys(domains);
    const userLang = navigator.language.split('-')[0]; // e.g., 'hi', 'zh', 'en'

    keys.forEach((key, index) => {
        const d = domains[key];
        const fibIdx = index; 
        const radius = FIB_SEQ[fibIdx] * FIB_SCALE;
        
        // Math Mapping
        const size = vectorToSize(d.vector);
        const color = vectorToColor(d.vector);
        const speed = vectorToSpeed(d.vector);
        const angle = Math.random() * Math.PI * 2; // Random starting position

        // Create 3D Planet
        const geo = new THREE.SphereGeometry(size, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ 
            color: color, 
            roughness: 0.6, 
            metalness: 0.3,
            emissive: color,
            emissiveIntensity: 0.2
        });
        const mesh = new THREE.Mesh(geo, mat);
        
        // Orbit Ring (Visual guide)
        const ringGeo = new THREE.RingGeometry(radius - 0.2, radius + 0.2, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.05, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        // Position
        mesh.position.set(radius * Math.cos(angle), 0, radius * Math.sin(angle));
        scene.add(mesh);

        // Create HTML Label (Multi-lingual)
        const labelName = d.languages[userLang] || d.languages['en'] || d.name;
        const label = document.createElement('div');
        label.className = 'node-label';
        label.innerHTML = `
            <span class="icon">${ICONS[index] || '✨'}</span>
            <span class="name">${labelName}</span>
            <span class="code">${key}</span>
        `;
        label.addEventListener('click', () => triggerSingularity(d, key));
        document.getElementById('labels-container').appendChild(label);

        // Store Data
        mesh.userData = { domainData: d, code: key };
        bodies.push({
            mesh, label, data: d, code: key,
            radius, angle, speed, size
        });
    });
}

// ==========================================
// 4. ANIMATION LOOP & LABEL PROJECTION
// ==========================================
function animate() {
    requestAnimationFrame(animate);
    
    const v = new THREE.Vector3();

    bodies.forEach(b => {
        // Orbital Physics
        b.angle += b.speed;
        b.mesh.position.x = b.radius * Math.cos(b.angle);
        b.mesh.position.z = b.radius * Math.sin(b.angle);
        b.mesh.rotation.y += 0.005;

        // Project 3D to 2D for HTML Labels
        v.setFromMatrixPosition(b.mesh.matrixWorld);
        v.project(camera);
        
        const x = (v.x * 0.5 + 0.5) * innerWidth;
        const y = (v.y * -0.5 + 0.5) * innerHeight;
        
        // Hide if behind camera
        if (v.z > 1) {
            b.label.style.opacity = '0';
        } else {
            b.label.style.opacity = '1';
            b.label.style.transform = `translate(-50%, -50%) translate(${x}px, ${y - (b.size * 15 + 20)}px)`;
        }
    });

    controls.update();
    renderer.render(scene, camera);
}

// ==========================================
// 5. INTERACTION (The Bridge to event.js)
// ==========================================
function onClick(event) {
    mouse.x = (event.clientX / innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const meshes = bodies.map(b => b.mesh);
    const intersects = raycaster.intersectObjects(meshes);
    
    if (intersects.length > 0) {
        const data = intersects[0].object.userData.domainData;
        const code = intersects[0].object.userData.code;
        triggerSingularity(data, code);
    }
}

function triggerSingularity(domainData, code) {
    console.log(`[Khela] Singularity Locked: ${code} -> ${domainData.name}`);
    
    // Fire the Event Bus for integral.js / event.js to catch
    window.dispatchEvent(new CustomEvent('khela:planet:focus', { 
        detail: { 
            code: code, 
            name: domainData.name,
            vector: domainData.vector,
            languages: domainData.languages
        } 
    }));

    // Visual Feedback (Camera Fly-in)
    const target = bodies.find(b => b.code === code);
    if(target) {
        const pos = target.mesh.position;
        const offset = target.size * 6;
        // Simple smooth transition
        const startPos = camera.position.clone();
        const endPos = new THREE.Vector3(pos.x + offset, pos.y + offset, pos.z + offset);
        let t = 0;
        const flyInterval = setInterval(() => {
            t += 0.02;
            if(t >= 1) { clearInterval(flyInterval); return; }
            camera.position.lerpVectors(startPos, endPos, t);
            controls.target.lerp(pos, t);
        }, 16);
    }
}

function onResize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
}

// BOOT
init();
</script>
</body>
</html>
