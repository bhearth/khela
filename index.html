<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khel.o | The Dot</title>
<style>
    /* 1. THE VOID (Mobile-First Canvas) */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { 
        background: #030406; color: #fff; font-family: system-ui, -apple-system, sans-serif; 
        overflow: hidden; height: 100vh; width: 100vw; touch-action: none;
    }

    /* 2. THE SEED (State 0: The 10px Golden Dot) */
    #seed {
        position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
        background: #fbbf24; border-radius: 50%;
        box-shadow: 0 0 20px 8px rgba(251,191,36,0.6);
        transform: translate(-50%, -50%);
        transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100; cursor: pointer;
        animation: seedPulse 3s infinite;
    }
    #seed.bloom { transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; }
    @keyframes seedPulse {
        0%, 100% { box-shadow: 0 0 20px 8px rgba(251,191,36,0.6); }
        50% { box-shadow: 0 0 40px 15px rgba(251,191,36,0.9); }
    }

    /* 3. THE UNIVERSE (State 1: The Golden Angle Bloom) */
    #universe {
        position: absolute; top: 50%; left: 50%; width: 0; height: 0;
        opacity: 0; transition: opacity 1.5s ease;
    }
    #universe.active { opacity: 1; }

    .node {
        position: absolute; width: 70px; height: 70px;
        background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(251,191,36,0.3);
        border-radius: 50%; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
        cursor: pointer; backdrop-filter: blur(8px);
    }
    .node.bloom { transform: translate(var(--x), var(--y)) scale(1); }
    .node:active { box-shadow: 0 0 30px rgba(251,191,36,0.8); border-color: #fbbf24; }
    
    .node-icon { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .node-word { font-size: 8px; letter-spacing: 1px; color: rgba(251,191,36,0.8); font-weight: 600; margin-top: 2px; text-transform: uppercase;}

    /* 4. THE SINGULARITY SHEET (State 2: The Action Hub) */
    #sheet {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
        border-top: 1px solid rgba(251,191,36,0.2);
        border-radius: 32px 32px 0 0; padding: 24px 24px 40px;
        transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 200; text-align: center;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
    }
    #sheet.active { transform: translateY(0); }
    
    .sheet-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .sheet-icon { font-size: 36px; }
    .sheet-title { font-size: 1.2rem; font-weight: 700; background: linear-gradient(90deg,#fbbf24,#14b8a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: monospace; letter-spacing: 2px; min-width: 120px;}
    
    .sheet-story { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; font-style: italic; min-height: 40px;}

    .sheet-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 400px; margin: 0 auto; }
    .action-btn {
        width: 100%; aspect-ratio: 1; border-radius: 20px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        font-size: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.2s; gap: 4px;
    }
    .action-btn span { font-size: 9px; color: #94a3b8; letter-spacing: 1px; }
    .action-btn:active { transform: scale(0.9); background: rgba(251,191,36,0.2); border-color: #fbbf24; }

    /* 5. UPI OVERLAY */
    #upi-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300;
        display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
    }
    #upi-overlay.active { display: flex; }
    #upi-overlay img { width: 200px; border-radius: 16px; border: 2px solid #14b8a6; }
    #upi-overlay p { color: #14b8a6; font-family: monospace; }
    #upi-overlay button { background: none; border: 1px solid #fff; color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer;}
</style>
</head>
<body>

<!-- The Seed -->
<div id="seed" role="button" aria-label="Awaken the Universe"></div>

<!-- The Universe -->
<div id="universe"></div>

<!-- The Singularity Sheet -->
<div id="sheet">
    <div class="sheet-header">
        <div class="sheet-icon" id="sheet-icon">✨</div>
        <div class="sheet-title" id="sheet-title">KHEL.O</div>
    </div>
    <div class="sheet-story" id="sheet-story">Tap a node to discover its resonance.</div>
    <div class="sheet-actions">
        <button class="action-btn" id="act-dice" aria-label="Roll Dice">🎲<span>Dice</span></button>
        <button class="action-btn" id="act-wiki" aria-label="Wiki Dive">📚<span>Wiki</span></button>
        <button class="action-btn" id="act-map" aria-label="Komute Map">🗺️<span>Komute</span></button>
        <button class="action-btn" id="act-seed" aria-label="Contribute">🌱<span>Seed</span></button>
    </div>
</div>

<!-- UPI Overlay -->
<div id="upi-overlay">
    <img src="https://raw.githubusercontent.com/krishnabhearth-svg/Kraizen-Journal/main/upi%20pay%20qr%20code.jpeg" alt="UPI QR">
    <p>krishna.bh.earth@upi</p>
    <button onclick="document.getElementById('upi-overlay').classList.remove('active')">Close</button>
</div>

<!-- The Genesis Engine -->
<script src="display.js"></script>
</body>
</html>
