<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khel.o | The EVOD Universe</title>
<link rel="manifest" href="manifest.json">
<style>
    /* =========================================
    CORE VOID & MOBILE FIRST (< 10KB CSS)
    ========================================= */
    :root { --bg: #030406; --gold: #fbbf24; --teal: #14b8a6; --text: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

    /* =========================================
    THE FIBONACCI FLOWER RENDERER
    ========================================= */
    #evo-container {
        position: relative; width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .evo-seed, .evo-petal {
        position: absolute;
        width: 80px; height: 80px; border-radius: 50%;
        background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(251,191,36,0.3);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        backdrop-filter: blur(10px); cursor: pointer;
        transform: translate(-50%, -50%) scale(0);
        animation: bloom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .evo-seed { width: 100px; height: 100px; border-color: var(--gold); box-shadow: 0 0 30px rgba(251,191,36,0.4); z-index: 10; }
    .evo-petal { 
        /* Fibonacci positioning via CSS variables */
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--radius))) rotate(calc(-1 * var(--angle))) scale(0);
    }
    .evo-petal:active { background: rgba(251,191,36,0.2); border-color: var(--gold); }
    
    .evo-seed .icon, .evo-petal .icon { font-size: 28px; margin-bottom: 4px; }
    .evo-seed .word, .evo-petal .word { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); font-weight: 700; }

    @keyframes bloom { to { transform: translate(-50%, -50%) rotate(var(--angle, 0deg)) translateY(calc(-1 * var(--radius, 0px))) rotate(calc(-1 * var(--angle, 0deg))) scale(1); } }

    .evo-loading, .evo-end {
        position: absolute; color: var(--teal); font-family: monospace; letter-spacing: 2px;
        animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    #evo-container {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.evo-seed {
    position: absolute; width: 100px; height: 100px; border-radius: 50%;
    background: rgba(251, 191, 36, 0.2); border: 2px solid #fbbf24;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(251, 191, 36, 0.4); z-index: 10;
}
.evo-petal {
    position: absolute; width: 80px; height: 80px; border-radius: 50%;
    background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(8px);
    /* Start at center, scaled to 0 */
    transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) rotate(calc(-1 * var(--angle))) scale(0);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
}
.evo-petal.bloom {
    /* Bloom outward using the math variables */
    transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--radius))) rotate(calc(-1 * var(--angle))) scale(1);
    opacity: 1;
}
.evo-petal:active { background: rgba(251, 191, 36, 0.2); border-color: #fbbf24; }
.icon { font-size: 24px; }
.word { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #fbbf24; margin-top: 4px; text-align: center;}
.evo-loading { color: #14b8a6; font-family: monospace; letter-spacing: 2px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>
<body>

<!-- The Universe Container -->
<div id="evo-container"></div>

<!-- The EVOD Engine -->
<script src="evo-engine.js"></script>

<script>
    // ==========================================
    // THE BIG BANG TRIGGER
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
        // Start with the root Sahyog seed
        EVOD.init('sahyog', 'evo-container');
    });

    // ==========================================
    // PWA INSTALL PROMPT
    // ==========================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });
</script>
</body>
</html>
