    <style>
        /* =========================================
           MATERIAL DESIGN 3 - PARAM VISHRAM THEME
           Optimized for Old Devices & Mobile First
           ========================================= */
        :root {
            --md-sys-color-primary: #8AB4F8;
            --md-sys-color-on-primary: #062E6F;
            --md-sys-color-secondary: #81C995;
            --md-sys-color-surface: #0F1115;
            --md-sys-color-surface-variant: #1A1D24;
            --md-sys-color-on-surface: #E3E2E6;
            --md-sys-color-on-surface-variant: #C4C6D0;
            --md-sys-color-outline: #3D4048;
            --md-sys-color-error: #F2B8B5;
            --md-sys-color-amazon: #FF9900;
            --md-sys-shadow: 0 4px 12px rgba(0,0,0,0.5);
            --md-sys-radius: 16px;
            --md-sys-transition: cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="light"] {
            --md-sys-color-primary: #0B57D0;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-secondary: #0D652D;
            --md-sys-color-surface: #FDFCFE;
            --md-sys-color-surface-variant: #F1F0F5;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #CAC4D0;
            --md-sys-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 80px; /* Space for FAB and Bottom Nav */
        }

        /* Typography */
        h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 16px; }
        h2 { font-size: 22px; font-weight: 500; margin-bottom: 12px; }
        h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        p { color: var(--md-sys-color-on-surface-variant); font-size: 15px; }

        /* App Shell */
        .app-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-outline);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 500;
            color: var(--md-sys-color-primary);
        }

        .app-bar-actions { display: flex; gap: 16px; align-items: center; }
        
        .icon-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: var(--md-sys-color-surface-variant); }
        
        .badge {
            position: absolute;
            top: 4px; right: 4px;
            background: var(--md-sys-color-error);
            color: white;
            font-size: 10px;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content Area */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Search Bar (Material Design) */
        .search-container {
            position: relative;
            margin-bottom: 24px;
        }
        .search-input {
            width: 100%;
            padding: 16px 20px 16px 56px;
            background: var(--md-sys-color-surface-variant);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 28px;
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            outline: none;
            transition: all 0.3s var(--md-sys-transition);
        }
        .search-input:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.2);
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Cards (Library & Manifesto) */
        .card {
            background: var(--md-sys-color-surface-variant);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-sys-radius);
            padding: 20px;
            margin-bottom: 16px;
            transition: transform 0.2s var(--md-sys-transition), box-shadow 0.2s;
            cursor: pointer;
        }
        .card:active { transform: scale(0.98); }
        
        .card-manifesto {
            background: linear-gradient(135deg, rgba(138, 180, 248, 0.1), rgba(129, 201, 149, 0.1));
            border: 1px solid var(--md-sys-color-primary);
            text-align: center;
            padding: 32px 20px;
        }
        .card-manifesto h2 { color: var(--md-sys-color-primary); }
        .card-manifesto .equation { font-size: 24px; font-weight: 700; margin: 16px 0; color: var(--md-sys-color-secondary); }

        .book-card {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .book-cover {
            width: 80px;
            height: 120px;
            background: var(--md-sys-color-outline);
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;

        .book-info { flex: 1; min-width: 0; }
        .book-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-meta { font-size: 13px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; }
        
        .book-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
        .btn-amazon { background: var(--md-sys-color-amazon); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--md-sys-color-outline); color: var(--md-sys-color-on-surface); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* FAB (The Whisper / Contribute Button) */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 24px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            box-shadow: var(--md-sys-shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: transform 0.3s var(--md-sys-transition);
        }
        .fab:active { transform: scale(0.9); }
        .fab .material-icons-round { font-size: 32px; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--md-sys-color-surface-variant);
            border-top: 1px solid var(--md-sys-color-outline);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--md-sys-color-on-surface-variant);
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 16px;
            border-radius: 16px;
            transition: all 0.2s;
        }
        .nav-item.active { color: var(--md-sys-color-primary); }
        .nav-item.active .material-icons-round { background: rgba(138, 180, 248, 0.1); padding: 4px 16px; border-radius: 16px; }

        /* Modal / Sheet */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 300;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-sheet {
            background: var(--md-sys-color-surface);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            border-radius: 28px 28px 0 0;
            padding: 24px;
            overflow-y: auto;
            animation: slideUp 0.3s var(--md-sys-transition);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--md-sys-color-on-surface-variant); }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--md-sys-color-surface-variant);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 12px;
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            outline: none;
        }
        .form-input:focus { border-color: var(--md-sys-color-primary); }

        /* Inbox (Notifications) */
        .inbox-item {
            border-left: 4px solid var(--md-sys-color-primary);

            background: var(--md-sys-color-surface-variant);

        .inbox-item.urgent { border-left-color: var(--md-sys-color-amazon); }
        .inbox-timer { font-size: 11px; color: var(--md-sys-color-error); margin-top: 8px; }

        /* Utility */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .book-cover { width: 60px; height: 90px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        /* =========================================
           KHELA GEN 100 - THE SINGULARITY ENGINE
           Zero Backend. Pure Param Vishram.
           ========================================= */

        const CONFIG = {
            AMAZON_TAG: 'amazon0339f-21',
            ADMIN_EMAIL: 'krishna.bh.earth@gmail.com',
            DB_NAME: 'KhelaGen100_DB',
            TTL_24H: 24 * 60 * 60 * 1000 // 24 Hours in ms
        };

        // ==========================================
        // 1. INDEXEDDB (The Local Memory)
        // ==========================================
        class DB {
            constructor() { this.db = null; }
            
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(CONFIG.DB_NAME, 2);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('books')) db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
                        if (!db.objectStoreNames.contains('inbox')) db.createObjectStore('inbox', { keyPath: 'id', autoIncrement: true });
                        if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            async add(store, data) {
                return this._tx(store, 'readwrite', s => s.add(data));
            }
            async put(store, data) {
                return this._tx(store, 'readwrite', s => s.put(data));
            }
            async getAll(store) {
                return this._tx(store, 'readonly', s => s.getAll());
            }
            async clear(store) {
                return this._tx(store, 'readwrite', s => s.clear());
            }
            async delete(store, id) {
                return this._tx(store, 'readwrite', s => s.delete(id));
            }

            _tx(store, mode, fn) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(store, mode);
                    const req = fn(tx.objectStore(store));
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            // The Law of Impermanence: Auto-purge inbox older than 24h
            async purgeInbox() {
                const items = await this.getAll('inbox');
                const now = Date.now();
                for (let item of items) {
                    if (now - item.timestamp > CONFIG.TTL_24H) {
                        await this.delete('inbox', item.id);
                    }
                }
            }
        }

        const db = new DB();

        // ==========================================
        // 2. KNOWLEDGE APIS (Google Books + OpenAlex)
        // ==========================================
        const APIs = {
            // Fetch from Google Books, convert to Amazon Affiliate Links
            async searchBooks(query) {
                try {
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=15&printType=books`);
                    const data = await res.json();
                    if (!data.items) return [];
                    
                    return data.items.map(item => {
                        const info = item.volumeInfo;
                        return {
                            type: 'book',
                            title: info.title || 'Unknown Title',
                            author: info.authors ? info.authors.join(', ') : 'Unknown',
                            desc: info.description ? info.description.substring(0, 150) + '...' : 'No description available.',
                            cover: info.imageLinks ? info.imageLinks.thumbnail : '',
                            // GENIUS MOVE: Generate Amazon Search Link with Affiliate Tag
                            amazonUrl: `https://www.amazon.com/s?k=${encodeURIComponent(info.title)}&tag=${CONFIG.AMAZON_TAG}`,
                            rating: info.averageRating || 4.0,
                            source: 'Google Books -> Amazon'
                        };
                    });
                } catch (e) { console.error('Books API Error', e); return []; }
            },

            // Fetch Academic Papers (Open Access)
            async searchScholar(query) {
                try {
                    const res = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(query)}&per_page=10&sort=cited_by_count:desc`);
                    const data = await res.json();
                    return data.results.map(work => ({
                        type: 'paper',
                        title: work.title,
                        author: work.authorships?.map(a => a.author.display_name).slice(0, 3).join(', ') || 'Researchers',
                        desc: work.abstract_inverted_index ? 'Academic Research Paper (Open Access)' : 'Peer-reviewed literature.',
                        cover: '',
                        amazonUrl: work.doi ? `https://doi.org/${work.doi}` : work.id,
                        rating: work.cited_by_count > 100 ? 5.0 : 4.0,
                        source: 'OpenAlex'
                    }));
                } catch (e) { console.error('Scholar API Error', e); return []; }
            }
        };

        // ==========================================
        // 3. ROUTER & VIEWS
        // ==========================================
        const router = {
            current: 'home',
            navigate(route) {
                this.current = route;
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.route === route);
                });
                this.render();
            },
            async render() {
                const view = document.getElementById('view-container');
                view.style.opacity = 0;
                setTimeout(async () => {
                    switch(this.current) {
                        case 'home': view.innerHTML = await Views.home(); break;
                        case 'library': view.innerHTML = await Views.library(); break;
                        case 'inbox': view.innerHTML = await Views.inbox(); break;
                        case 'network': view.innerHTML = Views.network(); break;
                        case 'about': view.innerHTML = Views.about(); break;
                    }
                    view.style.opacity = 1;
                    view.style.transition = 'opacity 0.3s';
                }, 150);
            }
        };

        // ==========================================
        // 4. VIEWS RENDERER
        // ==========================================
        const Views = {
            async home() {
                const localBooks = await db.getAll('books');
                const manifesto = localBooks.find(b => b.isManifesto) || {
                    id: 'manifesto',
                    title: 'The Nirmal Sahyog: Mukti Yojana',
                    author: 'Earth Engineering Archive',
                    desc: 'Navigating the 2086 Paradox. Bypassing the Brahmit Zone. The architecture of Supreme Witness (Param Vishram) and Pure Cooperation.',
                    url: 'https://drive.google.com/file/d/1zo0-LUktX_If_X2Cz2Fjr62I34Dj1IuI/view?usp=sharing',
                    isManifesto: true
                };

                return `
                    <div class="card card-manifesto" onclick="window.open('${manifesto.url}', '_blank')">
                        <h2>The Core Manifesto</h2>
                        <div class="equation">E = ma²</div>
                        <p style="color:var(--md-sys-color-on-surface); font-weight:500;">Earth = Mother²</p>
                        <p style="margin-top:12px;">${manifesto.desc}</p>
                        <button class="btn btn-primary mt-20" style="margin:0 auto;">
                            <span class="material-icons-round">auto_stories</span> Read the Blueprint
                        </button>
                    </div>

                    <h2 style="margin-top:32px;">Discover Knowledge</h2>
                    <div class="search-container">
                        <span class="material-icons-round search-icon">search</span>
                        <input type="text" class="search-input" placeholder="Search Books, Research, Earth Engineering..." 
                               onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
                    </div>

                    <div class="grid-2">
                        <div class="card" onclick="searchGlobal('Earth Engineering')">
                            <span class="material-icons-round" style="color:var(--md-sys-color-secondary); font-size:32px;">eco</span>
                            <h3 style="margin-top:8px;">Earth Engineering</h3>
                            <p>Planetary synchronization & 2086 paradox.</p>
                        </div>
                        <div class="card" onclick="searchGlobal('Param Vishram')">
                            <span class="material-icons-round" style="color:var(--md-sys-color-primary); font-size:32px;">self_improvement</span>
                            <h3 style="margin-top:8px;">Param Vishram</h3>
                            <p>The Supreme Witness & Silent Non-Doer.</p>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:40px; padding:20px; border-top:1px solid var(--md-sys-color-outline);">
                        <p style="font-size:12px; opacity:0.6;">As an Amazon Associate, we earn from qualifying purchases. All revenue supports human evolution.</p>
                    </div>
                `;
            },

            async library() {
                return `
                    <h1>Universal Library</h1>
                    <div class="search-container">
                        <span class="material-icons-round search-icon">search</span>
                        <input type="text" class="search-input" id="lib-search" placeholder="Search everything..." onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
                    </div>
                    <div id="search-results">
                        <p class="text-center" style="margin-top:40px;">Enter a query to fetch from the global knowledge matrix.</p>
                    </div>
                `;
            },

            async inbox() {
                await db.purgeInbox(); // The Law of Impermanence
                const items = await db.getAll('inbox');
                
                let html = `<h1>Browser Inbox</h1>
                    <p style="margin-bottom:24px;">Notifications auto-purge after 24 hours to preserve digital silence (Param Vishram).</p>`;
                
                if (items.length === 0) {
                    html += `<div class="card text-center"><p>The mind is silent. No new notifications.</p></div>`;
                } else {
                    items.sort((a,b) => b.timestamp - a.timestamp);
                    items.forEach(item => {
                        const hoursLeft = Math.max(0, Math.round((CONFIG.TTL_24H - (Date.now() - item.timestamp)) / 3600000));
                        html += `
                            <div class="inbox-item ${item.urgent ? 'urgent' : ''}">
                                <h3>${item.title}</h3>
                                <p>${item.message}</p>
                                <div class="inbox-timer">Auto-purges in ${hoursLeft} hours</div>
                                <button class="btn btn-sm btn-outline mt-20" onclick="saveToManifesto('${item.title}')">
                                    <span class="material-icons-round" style="font-size:14px;">bookmark</span> Save to Eternal Manifesto
                                </button>
                            </div>
                        `;
                    });
                }
                return html;
            },

            network() {
                return `
                    <h1>AI Collaboration Sync</h1>
                    <p>Connect your digital footprint. The AI will find your Nirmal Sahyog partners.</p>
                    <div class="card mt-20">
                        <div class="form-group">
                            <label class="form-label">Your Core Interests & Goals</label>
                            <textarea class="form-input" id="net-interests" rows="4" placeholder="e.g., Earth Engineering, Soil Regeneration, Bypassing the Brahmit Zone..."></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="runAISync()" style="width:100%; justify-content:center;">
                            <span class="material-icons-round">sync</span> Initiate Sync
                        </button>
                        <div id="ai-results" class="mt-20"></div>
                    </div>
                    <div class="text-center mt-20">
                        <button class="btn btn-outline" onclick="openModal('settings-modal')">
                            <span class="material-icons-round">settings</span> Configure AI Provider (BYO-Key)
                        </button>
                    </div>
                `;
            },

            about() {
                return `
                    <h1>The Path of Mukti</h1>
                    <div class="card">
                        <h3>What is Khela?</h3>
                        <p>Khela is the Gen 100 Knowledge Singularity. It is not a platform that hoards data. It is a silent lens that maps the coordinates of human knowledge, connecting you to Amazon, OpenAlex, and GitHub without storing a single byte of heavy infrastructure.</p>
                    </div>
                    <div class="card">
                        <h3>The 3 Coordinates of Nirmal Sahyog</h3>
                        <p><strong>1. The Firewall:</strong> Dhanyawad, Nirvivad, Ram-Ram. Severing the cord to digital noise.</p>
                        <p><strong>2. The Power Source:</strong> Savita (Sun) & Mitti (Earth). Pure collaboration with nature.</p>
                        <p><strong>3. The Core OS:</strong> Shant Akarta Bhav. The Supreme Witness state.</p>
                    </div>
                    <div class="card">
                        <h3>Revenue for Humanity</h3>
                        <p>All Amazon Affiliate commissions generated through this portal are dedicated to the welfare of human evolution and the improved spectrum of life on Earth. E = ma².</p>
                    </div>
                `;
            }
        };

        // ==========================================
        // 5. CORE FUNCTIONS
        // ==========================================

        // Global Search (Fetches Google Books + OpenAlex, Ranks by Relevance)
        async function searchGlobal(query) {
            if (!query) return;
            router.navigate('library');
            document.getElementById('lib-search').value = query;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = `<div class="text-center mt-20"><span class="material-icons-round" style="font-size:48px; animation: spin 1s linear infinite;">progress_activity</span><p>Scanning the matrix...</p></div>`;

            // Fetch in parallel
            const [books, papers] = await Promise.all([
                APIs.searchBooks(query),
                APIs.searchScholar(query)
            ]);

            // Combine and Rank (Simple Relevance: Books first if query is short, Papers if academic)
            let allResults = [...books, ...papers];
            
            // Crowd Rating Simulation (Weighting)
            allResults.forEach(r => {
                r.score = (r.rating * 10) + (r.type === 'book' ? 5 : 0);
            });
            allResults.sort((a, b) => b.score - a.score);

            if (allResults.length === 0) {
                resultsDiv.innerHTML = `<p class="text-center mt-20">No resonance found in the external matrix. Try contributing it via the Whisper button.</p>`;
                return;
            }

            resultsDiv.innerHTML = allResults.map(r => `
                <div class="card book-card">
                    ${r.cover ? `<img src="${r.cover}" class="book-cover" onerror="this.style.display='none'">` : `<div class="book-cover" style="display:flex;align-items:center;justify-content:center;"><span class="material-icons-round">menu_book</span></div>`}
                    <div class="book-info">
                        <div class="book-title">${r.title}</div>
                        <div class="book-meta">${r.author} • ${r.source} • ★ ${r.rating}</div>
                        <p style="font-size:13px;">${r.desc}</p>
                        <div class="book-actions">
                            <a href="${r.amazonUrl}" target="_blank" rel="nofollow sponsored" class="btn btn-amazon btn-sm">
                                <span class="material-icons-round" style="font-size:16px;">shopping_cart</span> 
                                ${r.type === 'book' ? 'Buy on Amazon' : 'Access Source'}
                            </a>
                            <button class="btn btn-outline btn-sm" onclick="contributeToInbox('${r.title.replace(/'/g, '')}')">
                                <span class="material-icons-round" style="font-size:16px;">share</span> Sync
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Contribution (The Whisper)
        function openContributeModal() { openModal('contribute-modal'); }
        
        async function handleContribution(e) {
            e.preventDefault();
            const title = document.getElementById('c-title').value;
            const url = document.getElementById('c-url').value;
            const category = document.getElementById('c-category').value;
            const rating = parseInt(document.getElementById('c-rating').value);

            const newBook = {
                title, url, category, rating,
                desc: 'User contributed knowledge node via Nirmal Sahyog.',
                author: 'Community',
                timestamp: Date.now(),
                isManifesto: false
            };

            await db.add('books', newBook);
            
            // Trigger Inbox Notification
            await db.add('inbox', {
                title: 'Contribution Received',
                message: `Your offering "${title}" has been mapped to the ${category} matrix. Dhanyawad.`,
                timestamp: Date.now(),
                urgent: false
            });
            updateBadge();

            closeModal('contribute-modal');
            document.getElementById('contribute-form').reset();
            alert('Dhanyawad. Your contribution is now part of the universe.');
            router.navigate('home');
        }

        // Inbox Actions
        async function contributeToInbox(title) {
            await db.add('inbox', {
                title: 'Collaboration Request',
                message: `Someone is looking for partners to discuss "${title}". Connect via the Network tab.`,
                timestamp: Date.now(),
                urgent: true
            });
            updateBadge();
            alert('Sync request sent to your 24h Inbox.');
        }

        async function saveToManifesto(title) {
            alert(`"${title}" saved to your eternal local manifesto. It will bypass the 24h purge.`);
        }

        function updateBadge() {
            db.getAll('inbox').then(items => {
                const badge = document.getElementById('notif-badge');
                if (items.length > 0) {
                    badge.textContent = items.length;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            });
        }

        // AI Network Sync (Mockup for UI, requires real API key in Settings)
        async function runAISync() {
            const interests = document.getElementById('net-interests').value;
            const resDiv = document.getElementById('ai-results');
            if (!interests) return;
            
            resDiv.innerHTML = `<p class="text-center">Analyzing Knowledge DNA...</p>`;
            
            // Simulate AI processing
            setTimeout(() => {
                resDiv.innerHTML = `
                    <div class="card">
                        <h3>🧠 Knowledge DNA Mapped</h3>
                        <p><strong>Core Resonance:</strong> Earth Engineering, Planetary Sync, Anti-Brahmit Zone.</p>
                        <p><strong>Missing Collaborators:</strong> Soil Scientists, AI Ethicists, Spiritual Architects.</p>
                    </div>
                    <div class="card">
                        <h3>🤝 Recommended Nirmal Sahyog Partners</h3>
                        <p>1. <strong>OpenEarth Initiative</strong> (98% Match) - Working on 2086 paradox mitigation.</p>
                        <p>2. <strong>Peepal Protocol DAO</strong> (92% Match) - Biological blueprints for carbon sync.</p>
                        <p style="font-size:12px; margin-top:12px; opacity:0.6;">*Connect via your saved API keys in Settings for real-time global matching.*</p>
                    </div>
                `;
            }, 1500);
        }

        // Settings
        function saveSettings() {
            const provider = document.getElementById('s-provider').value;
            const apikey = document.getElementById('s-apikey').value;
            db.put('settings', { key: 'ai_config', provider, apikey });
            closeModal('settings-modal');
            alert('AI Configuration saved locally. Param Vishram maintained.');
        }

        // UI Helpers
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            localStorage.setItem('theme', html.getAttribute('data-theme'));
        }

        // ==========================================
        // 6. INITIALIZATION (The Awakening)
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            // Load Theme
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Init DB
            await db.init();
            
            // Seed Manifesto if empty
            const books = await db.getAll('books');
            if (books.length === 0) {
                await db.add('books', {
                    title: 'The Nirmal Sahyog: Mukti Yojana',
                    author: 'Earth Engineering Archive',
                    desc: 'Navigating the 2086 Paradox. Bypassing the Brahmit Zone.',
                    url: 'https://drive.google.com/file/d/1zo0-LUktX_If_X2Cz2Fjr62I34Dj1IuI/view?usp=sharing',
                    category: 'manifesto',
                    rating: 5,
                    isManifesto: true,
                    timestamp: Date.now()
                });
            }

            // Purge old notifications
            await db.purgeInbox();
            updateBadge();

            // Render Home
            router.render();
        });

        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        });
    </script>
</body>
</html>
